<!doctype html>
<html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>تقارير التكلفة والربحية — مصنع بن حامد</title><style>
*{box-sizing:border-box}body{margin:0;background:#f4f0e8;color:#173746;font-family:system-ui,-apple-system,"Segoe UI",sans-serif}.wrap{width:min(1400px,96vw);margin:20px auto 60px}.head,.card{background:#fff;border:1px solid #ddd7cc;border-radius:16px;padding:17px;box-shadow:0 9px 28px #17374610}.head{background:#0b2f42;color:#fff;display:flex;gap:12px;align-items:center;flex-wrap:wrap}.head h1{margin:0;font-size:24px}.actions{margin-inline-start:auto;display:flex;gap:8px;flex-wrap:wrap}.actions input,.actions button,.actions a{border:0;border-radius:9px;padding:10px 12px;font:inherit;font-weight:800}.actions input{background:#fff}.actions button,.actions a{background:#b8892f;color:#fff;text-decoration:none;cursor:pointer}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:12px;margin-top:13px}.card{grid-column:span 12}.half{grid-column:span 6}.third{grid-column:span 4}.card h2{margin:0 0 9px}.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.metric{padding:11px;background:#edf1f0;border-radius:10px}.metric span{font-size:11px;color:#61757d}.metric b{display:block;font-size:20px;margin-top:3px}.table{overflow:auto;border:1px solid #ddd7cc;border-radius:10px}table{width:100%;border-collapse:collapse;min-width:650px}th,td{padding:7px 8px;border-bottom:1px solid #eee9df;text-align:right;font-size:12px}th{background:#e8eeee}.notice{margin-top:12px;padding:11px;border-radius:9px;background:#fff1c9;color:#74550c;white-space:pre-wrap}.notice.ok{background:#e0f2e6;color:#17613c}.notice.bad{background:#ffe4e4;color:#8a2929}.warn{background:#fff0d3;border:1px solid #e1c06a;border-radius:10px;padding:10px;line-height:1.8}@media(max-width:900px){.half,.third{grid-column:span 12}.metrics{grid-template-columns:repeat(2,1fr)}}@media(max-width:520px){.metrics{grid-template-columns:1fr}.actions{margin:0;width:100%}.actions>*{flex:1}}</style></head>
<body><main class="wrap"><header class="head"><div><h1>تقارير التكلفة والربحية</h1><div>التكلفة الفعلية، العملاء، المركبات، الخلطات ونقطة التعادل</div></div><div class="actions"><input id="period" type="month"><button id="load">عرض</button><button id="pdf">تنزيل PDF</button><button id="print">طباعة</button><a href="/mix-designs.html">الخلطات</a><a href="/control-center.html">الرقابة</a></div></header><div id="message" class="notice">جاري تحميل التقرير...</div><section id="content" class="grid"></section></main>
<script>
(()=>{'use strict';const API='/api/costs',TOKEN_KEY='binhamid_cloud_access_token',$=id=>document.getElementById(id),state={report:null};const token=()=>{const t=localStorage.getItem(TOKEN_KEY)||'';return t&&t!=='device-session'?t:'';};const headers=()=>({'Content-Type':'application/json',...(token()?{Authorization:'Bearer '+token()}:{})});const money=v=>Number(v||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}),qty=v=>Number(v||0).toLocaleString('en-US',{maximumFractionDigits:3}),pct=v=>Number(v||0).toLocaleString('en-US',{maximumFractionDigits:1});
function show(text,type=''){const box=$('message');box.className='notice '+type;box.textContent=text;}function node(tag,text='',cls=''){const el=document.createElement(tag);el.textContent=text==null?'—':String(text);if(cls)el.className=cls;return el;}function card(title,cls=''){const box=node('article','',`card ${cls}`);box.appendChild(node('h2',title));return box;}function table(headersList,rows){const wrap=node('div','', 'table'),t=node('table'),thead=node('thead'),tr=node('tr');for(const h of headersList)tr.appendChild(node('th',h));thead.appendChild(tr);t.appendChild(thead);const body=node('tbody');for(const row of rows){const r=node('tr');for(const value of row)r.appendChild(node('td',value));body.appendChild(r);}if(!rows.length){const r=node('tr'),d=node('td','لا توجد بيانات');d.colSpan=headersList.length;r.appendChild(d);body.appendChild(r);}t.appendChild(body);wrap.appendChild(t);return wrap;}
function metrics(report){const box=card('الملخص التنفيذي'),grid=node('div','', 'metrics'),items=[['حالة الفترة',report.periodStatus],['جاهزية القرار',report.decisionReady?'جاهز':'مشروط'],['عدد العملاء',report.customerCount],['هامش سالب',report.negativeCustomers.length],['مركبات بلا رحلات',report.vehiclesWithoutTrips.length],['عدادات غير موثوقة',report.unreliableOdometers.length],['خلطات معتمدة',report.mixes.length],['موانع القرار',report.quality.blockers.length]];for(const [label,value] of items){const m=node('div','', 'metric');m.append(node('span',label),node('b',value));grid.appendChild(m);}box.appendChild(grid);return box;}
function render(report){state.report=report;const root=$('content');root.replaceChildren();root.appendChild(metrics(report));const products=card('تكلفة المنتجات','half');products.appendChild(table(['المنتج','الكمية','الإيراد','التكلفة','تكلفة الوحدة','الهامش'],report.products.map(r=>[r.costCenter==='block'?'البلوك':'الخرسانة',qty(r.quantity),money(r.revenue),money(r.actualCost),money(r.unitCost),r.marginRate==null?'—':pct(r.marginRate)+'%'])));root.appendChild(products);const breaks=card('نقطة التعادل','half');breaks.appendChild(table(['المنتج','الإيراد','مبيعات التعادل','وحدات التعادل'],report.breakEven.map(r=>[r.costCenter==='block'?'البلوك':'الخرسانة',money(r.revenue),r.breakEvenRevenue==null?'—':money(r.breakEvenRevenue),r.breakEvenUnits==null?'—':qty(r.breakEvenUnits)])));root.appendChild(breaks);const vehicles=card('أعلى المركبات تكلفة');vehicles.appendChild(table(['المركبة','الوقود','اللترات','الصيانة','العمالة','الرحلات','المسافة','الإجمالي','تكلفة/كم'],report.vehicles.map(r=>[r.label,money(r.fuel),qty(r.fuelLiters),money(r.maintenance),money(r.labor),r.trips,r.distanceReliable?qty(r.distance):'غير موثوق',money(r.operatingCost),r.costPerKm==null?'—':money(r.costPerKm)])));root.appendChild(vehicles);const workers=card('أعلى الموظفين تكلفة','half');workers.appendChild(table(['الموظف','المركبة','تكلفة الشهر','الحضور','الرحلات','وقود مسؤولية'],report.workers.map(r=>[r.name,r.vehicle||'—',money(r.monthlyCost),r.attendanceDays,r.completedTrips,money(r.responsibleFuelCost)])));root.appendChild(workers);const negatives=card('عملاء بهامش سالب','half');negatives.appendChild(table(['الكود','العميل','المبيعات','التكلفة','الربح','الهامش','الرصيد'],report.negativeCustomers.map(r=>[r.code||'—',r.name,money(r.netSalesBeforeVat),money(r.estimatedCost),money(r.profit),r.marginRate==null?'—':pct(r.marginRate)+'%',money(r.balance)])));root.appendChild(negatives);const best=card('أفضل العملاء ربحية');best.appendChild(table(['الكود','العميل','المبيعات','التكلفة','الربح','الهامش','أيام التحصيل التقديرية'],report.bestCustomers.map(r=>[r.code||'—',r.name,money(r.netSalesBeforeVat),money(r.estimatedCost),money(r.profit),r.marginRate==null?'—':pct(r.marginRate)+'%',r.collectionDaysEstimate==null?'—':pct(r.collectionDaysEstimate)])));root.appendChild(best);const mixes=card('الخلطات المعيارية','half');mixes.appendChild(table(['الكود','الخلطة','الإصدار','التكلفة','سعر البيع','الهامش'],report.mixes.map(r=>[r.code,r.name,r.version_no,money(r.total_cost_per_m3),money(r.recommended_price),pct(r.target_margin_percent)+'%'])));root.appendChild(mixes);const compare=card('المعياري مقابل الفعلي','half');compare.appendChild(table(['الكود','الخلطة','المعياري','الفعلي','الفرق','الفرق %'],report.comparisons.map(r=>[r.code,r.name,money(r.standardCost),r.actualCost==null?'—':money(r.actualCost),r.variance==null?'—':money(r.variance),r.variancePercent==null?'—':pct(r.variancePercent)+'%'])));root.appendChild(compare);const quality=card('جودة البيانات وموانع القرار');const warn=node('div','', 'warn');warn.textContent=report.quality.blockers.length?report.quality.blockers.map(x=>'• '+x).join('\n'):'لا توجد موانع مسجلة.';quality.appendChild(warn,node('p',report.customerDisclaimer));root.appendChild(quality);}
async function load(){show('جاري تحميل التقرير...');try{const response=await fetch(`${API}?action=comprehensive&period=${encodeURIComponent($('period').value)}`,{credentials:'same-origin',cache:'no-store',headers:headers()}),data=await response.json().catch(()=>({}));if(!response.ok)throw new Error(data.error||'تعذر تحميل التقرير');render(data.report);show('تم تحميل التقرير.','ok');}catch(error){show(error.message,'bad');}}
async function pdf(){show('جاري إنشاء PDF...');try{const response=await fetch(API,{method:'POST',credentials:'same-origin',headers:headers(),body:JSON.stringify({action:'comprehensive_pdf',period:$('period').value})});const type=response.headers.get('content-type')||'';if(response.ok&&type.includes('application/pdf')){const blob=await response.blob(),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download=`cost-profitability-${$('period').value}.pdf`;a.click();setTimeout(()=>URL.revokeObjectURL(url),1000);show('تم إنشاء ملف PDF.','ok');return;}const data=await response.json().catch(()=>({}));if(!response.ok)throw new Error(data.error||'تعذر إنشاء PDF');if(data.report)render(data.report);show(`تم إنشاء التقرير، لكن PDF غير متاح: ${data.pdfError?.message||'الخدمة غير مضبوطة'}`,'bad');}catch(error){show(error.message,'bad');}}
$('load').onclick=load;$('pdf').onclick=pdf;$('print').onclick=()=>window.print();$('period').value=new Date().toISOString().slice(0,7);load();})();
</script></body></html>
