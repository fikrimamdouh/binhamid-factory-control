<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>نظام رقابة مصنع بن حامد</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style>
    html,body{height:100%;margin:0;background:#f7f3ec;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:#163746;overflow:hidden}
    .boot{position:fixed;inset:0;z-index:2;display:grid;place-items:center;padding:24px;text-align:center;background:#f7f3ec}
    .boot-card{width:min(520px,92vw);background:#fff;border:1px solid #e2dcd1;border-radius:16px;padding:28px;box-shadow:0 18px 50px rgba(11,34,51,.12)}
    .boot-mark{display:block;width:min(255px,72vw);height:auto;max-height:108px;object-fit:contain;margin:0 auto 14px}
    .boot h1{font-size:20px;margin:0 0 8px}.boot p{font-size:13px;color:#697b84;margin:0;line-height:1.8}
    .boot-line{height:4px;background:#edf1f2;border-radius:8px;overflow:hidden;margin-top:18px}.boot-line:before{content:"";display:block;width:35%;height:100%;background:#a97926;animation:load 1s infinite alternate ease-in-out}@keyframes load{to{transform:translateX(-185%)}}
    .boot-error{color:#922f2f;background:#fff1f1;border:1px solid #edcccc;padding:12px;border-radius:10px;margin-top:14px;display:none;white-space:pre-wrap;text-align:right}
    #appFrame{width:100%;height:100%;border:0;display:block;background:#f7f3ec;visibility:hidden;opacity:0;transition:opacity .12s ease}
  </style>
</head>
<body>
  <main class="boot" id="bootScreen"><section class="boot-card"><img class="boot-mark" src="/assets/branding/binhamid-factory-logo.png" alt="مصنع بن حامد للبلوك والخرسانة الجاهزة"><h1>نظام رقابة مصنع بن حامد</h1><p>تحميل النسخة التشغيلية وربط طبقة الحفظ السحابي ومركز الاتصال.</p><div class="boot-line"></div><div id="bootError" class="boot-error"></div></section></main>
  <iframe id="appFrame" title="نظام رقابة مصنع بن حامد" allow="unload; geolocation" src="about:blank" data-src="/legacy.html?v=20260723-sales-role-link-1"></iframe>
  <script>
  (function boot(){
    const frame=document.getElementById('appFrame'),screen=document.getElementById('bootScreen'),errorBox=document.getElementById('bootError');let completed=false,frameLoaded=false,loadSequence=0,legacyStarted=false;
    const statuses=[['','غير محدد'],['in_service','في الخدمة'],['parked','مركون / احتياطي'],['stopped','متوقف'],['maintenance','في الصيانة'],['out_of_service','خارج الخدمة'],['sold','مباع / مستبعد']];
    function installVehicleGlobals(win){if(!win)return;try{if(!Array.isArray(win.BH4_VEHICLE_STATUSES))win.BH4_VEHICLE_STATUSES=statuses;if(typeof win.bh4DieselExpected!=='function')win.bh4DieselExpected=function(v){const mode=String(v&&v.dieselExpected||'auto'),status=String(v&&v.operationalStatus||'');if(mode==='yes')return true;if(mode==='no')return false;if(status==='in_service')return true;if(['parked','stopped','maintenance','out_of_service','sold'].includes(status))return false;return null;};if(typeof win.bh4StatusChip!=='function')win.bh4StatusChip=function(v){const status=String(v&&v.operationalStatus||''),entry=win.BH4_VEHICLE_STATUSES.find(x=>x[0]===status)||win.BH4_VEHICLE_STATUSES[0],cls=({in_service:'active',parked:'parked',maintenance:'maintenance',stopped:'stopped',out_of_service:'out',sold:'out'})[status]||'';return '<span class="bh4-status '+cls+'">'+entry[1]+'</span>';};}catch(error){console.error('[BinHamid vehicle preflight]',error);}}
    const vehiclePreflight=setInterval(()=>installVehicleGlobals(frame.contentWindow),0);
    function fail(error){const message=String(error&&error.message||error||'تعذر تحميل البرنامج.');if(errorBox){errorBox.style.display='block';errorBox.textContent=message+'\nأعد تحميل الصفحة. بيانات المتصفح المحلية لم تُحذف.';}console.error('[BinHamid boot]',error);}
    function revealFrame(){frame.style.visibility='visible';frame.style.opacity='1';if(completed)return;completed=true;screen?.remove();}
    function injectScript(doc,id,src,onerror){return new Promise((resolve,reject)=>{const existing=doc.getElementById(id);if(existing){if(existing.dataset.loaded==='1')return resolve(existing);existing.addEventListener('load',()=>resolve(existing),{once:true});existing.addEventListener('error',()=>reject(new Error(onerror||`تعذر تحميل ${src}`)),{once:true});return;}const script=doc.createElement('script');script.id=id;script.src=src;script.async=false;script.onload=()=>{script.dataset.loaded='1';resolve(script);};script.onerror=()=>reject(new Error(onerror||`تعذر تحميل ${src}`));doc.body.appendChild(script);});}
    function browserIdle(win){return new Promise(resolve=>{if(typeof win.requestIdleCallback==='function')win.requestIdleCallback(()=>resolve(),{timeout:280});else setTimeout(resolve,70);});}
    async function loadOptionalExtensions(win,extensions,load,sequence){console.info('[BinHamid boot] optional modules loading in idle slices');for(const[id,src]of extensions){if(sequence!==loadSequence)return;await browserIdle(win);if(sequence!==loadSequence)return;await load(id,src,`تعذر تحميل ${id}`);}console.info('[BinHamid boot] optional modules loaded');}
    function openRequestedWorkspace(win,sequence){const target=new URL(location.href).searchParams.get('open')||'';if(target==='declarations')return setTimeout(()=>{if(sequence===loadSequence&&typeof win.go==='function')win.go('print');},100);const allowed=['dashboard','movements','custody','fleet','maintenance','inventory','production','deliveries','safety','documents','reports','backup'];if(allowed.includes(target))setTimeout(()=>{if(sequence===loadSequence&&typeof win.opsGo==='function')win.opsGo(target);},100);}
    async function prepareFrame(doc,win,sequence){
      installVehicleGlobals(win);
      if(!doc.getElementById('binhamid-cloud-style')){const link=doc.createElement('link');link.id='binhamid-cloud-style';link.rel='stylesheet';link.href='/assets/cloud-control.css?v=20260718-stable-shell-1';doc.head.appendChild(link);}
      const load=(id,src,error)=>injectScript(doc,id,src,error).catch(reason=>{console.error('[BinHamid]',reason);return null;});
      await load('binhamid-cloud-device-autolink','/assets/cloud-device-autolink.js?v=20260718-stable-shell-1','تعذر تحميل الربط التلقائي للجهاز.');
      await Promise.race([Promise.resolve(win.bhCloudDeviceReady).catch(error=>console.error('[BinHamid] تعذر إنشاء جلسة الجهاز التلقائية.',error)),new Promise(resolve=>setTimeout(resolve,1200))]);
      await injectScript(doc,'binhamid-state-load-performance','/assets/state-load-performance.js?v=20260722-3','تعذر تحميل تحسين مزامنة الحالة.');
      await injectScript(doc,'binhamid-cloud-script','/assets/cloud-control.js?v=20260723-conflict-auto-recovery-1','تعذر تحميل مركز الاتصال، بينما النسخة الأساسية ما زالت متاحة.');
      await injectScript(doc,'binhamid-final-ui-consistency','/assets/final-ui-consistency.js?v=20260721-4','تعذر تحميل تثبيت الأرصدة والحضور.');
      await injectScript(doc,'binhamid-sync-integrity-guard','/assets/sync-integrity-guard.js?v=20260723-6','تعذر تحميل حماية تعارض المزامنة.');
      const criticalExtensions=[
        ['binhamid-owner-web-login','/assets/owner-web-login.js?v=20260723-verified-session-1'],
        ['binhamid-login-sync','/assets/login-sync.js?v=20260723-no-print'],
        ['binhamid-session-controls','/assets/session-controls.js?v=20260721-1'],
        ['binhamid-canonical-declaration-texts','/assets/canonical-declaration-texts.js?v=20260722-2'],
        ['binhamid-single-master-workspace','/assets/single-master-workspace.js?v=20260723-1']
      ];
      const optionalExtensions=[
        ['binhamid-employee-declaration-sync','/assets/employee-declaration-sync.js?v=20260723-canonical-roster-5'],['binhamid-declaration-workspace-fixes','/assets/declaration-workspace-fixes.js?v=20260723-1'],['binhamid-vehicle-master-link','/assets/vehicle-master-link.js?v=20260723-2'],['binhamid-customer-opening-balances','/assets/customer-opening-balances.js?v=20260719-2'],['binhamid-customer-encrypted-bootstrap','/assets/customer-opening-balances-bootstrap.js?v=20260719-2'],['binhamid-opening-balances-chunked-sync','/assets/opening-balances-chunked-sync.js?v=20260721-3'],['binhamid-telegram-pdf-declarations','/assets/telegram-pdf-declarations.js?v=20260723-9'],['binhamid-cloud-navigation-fix','/assets/cloud-control-navigation-fix.js?v=20260716-4'],['binhamid-conversation-control','/assets/cloud-conversations.js?v=20260716-2'],['binhamid-bot-activity-dashboard','/assets/bot-activity-dashboard.js?v=20260718-1'],['binhamid-operations-control','/assets/cloud-operations.js?v=20260716-2'],['binhamid-operations-actions','/assets/cloud-operations-actions.js?v=20260716-1'],['binhamid-reports-control','/assets/cloud-reports.js?v=20260716-1'],['binhamid-user-roles','/assets/cloud-user-roles.js?v=20260721-bot-icons-1'],['binhamid-daily-summary-parser','/assets/daily-summary-parser.js?v=20260717-3'],['binhamid-existing-daily-import-fix','/assets/existing-daily-import-fix.js?v=20260717-2'],['binhamid-import-file-validation','/assets/import-file-validation.js?v=20260723-parser-overlap-1'],['binhamid-declarations-customer-ledger-fix','/assets/declarations-customer-ledger-fix.js?v=20260723-sales-role-2'],['binhamid-import-review-guard','/assets/import-review-guard.js?v=20260717-1'],['binhamid-daily-report-source','/assets/daily-report-source-of-truth.js?v=20260717-final-acceptance-19'],['binhamid-telegram-site-two-way','/assets/telegram-site-two-way.js?v=20260718-2'],['binhamid-factory-reset-cloud','/assets/factory-reset-cloud.js?v=20260718-1'],['binhamid-fleet-attendance-status','/assets/fleet-attendance-status.js?v=20260718-1'],['binhamid-internal-fuel-control','/assets/internal-fuel-control.js?v=20260718-1'],['binhamid-governance-entry','/assets/governance-entry.js?v=20260717-final-acceptance-19'],['binhamid-default-sales-reps','/assets/default-sales-reps.js?v=20260723-5'],['binhamid-admin-nav-tabs','/assets/admin-nav-tabs.js?v=20260721-2'],['binhamid-bot-interactions-log','/assets/bot-interactions-log.js?v=20260720-1']
      ];
      await Promise.all(criticalExtensions.map(([id,src])=>load(id,src,`تعذر تحميل ${id}`)));
      if(sequence!==loadSequence)return;openRequestedWorkspace(win,sequence);void loadOptionalExtensions(win,optionalExtensions,load,sequence);
    }
    frame.addEventListener('load',async function(){if(!legacyStarted)return;frameLoaded=true;clearInterval(vehiclePreflight);installVehicleGlobals(frame.contentWindow);const sequence=++loadSequence;if(!completed){frame.style.visibility='hidden';frame.style.opacity='0';}try{const doc=frame.contentDocument,win=frame.contentWindow;if(!doc||!doc.head||!doc.body||!win)throw new Error('تعذر الوصول إلى النسخة التشغيلية.');await prepareFrame(doc,win,sequence);if(sequence!==loadSequence)return;revealFrame();}catch(error){if(sequence===loadSequence){frame.style.visibility='visible';frame.style.opacity='1';fail(error);}}});
    frame.addEventListener('error',()=>fail(new Error('تعذر تحميل النسخة التشغيلية.')));
    installVehicleGlobals(frame.contentWindow);legacyStarted=true;frame.src=frame.dataset.src;
    setTimeout(()=>{if(frameLoaded&&!completed){console.warn('[BinHamid boot] إظهار البرنامج مع استكمال الوحدات في الخلفية.');revealFrame();}},6000);setTimeout(()=>{if(!frameLoaded)fail(new Error('تعذر تحميل النسخة التشغيلية.'));},60000);
  })();
  </script>
</body>
</html>
