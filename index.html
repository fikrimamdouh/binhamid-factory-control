<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>نظام رقابة مصنع بن حامد</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style>
    html,body{height:100%;margin:0;background:#f7f3ec;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:#163746;overflow:hidden}
    .boot{position:fixed;inset:0;z-index:2;display:grid;place-items:center;padding:24px;text-align:center;background:#f7f3ec}
    .boot-card{width:min(520px,92vw);background:#fff;border:1px solid #e2dcd1;border-radius:16px;padding:28px;box-shadow:0 18px 50px rgba(11,34,51,.12)}
    .boot-mark{display:block;width:min(255px,72vw);height:auto;max-height:108px;object-fit:contain;margin:0 auto 14px}
    .boot h1{font-size:20px;margin:0 0 8px}.boot p{font-size:13px;color:#697b84;margin:0;line-height:1.8}
    .boot-line{height:4px;background:#edf1f2;border-radius:8px;overflow:hidden;margin-top:18px}.boot-line:before{content:"";display:block;width:35%;height:100%;background:#a97926;animation:load 1s infinite alternate ease-in-out}@keyframes load{to{transform:translateX(-185%)}}
    .boot-error{color:#922f2f;background:#fff1f1;border:1px solid #edcccc;padding:12px;border-radius:10px;margin-top:14px;display:none;white-space:pre-wrap;text-align:right}
    #appFrame{width:100%;height:100%;border:0;display:block;background:#f7f3ec;visibility:hidden;opacity:0;transition:opacity .12s ease}
  </style>
</head>
<body>
  <main class="boot" id="bootScreen">
    <section class="boot-card">
      <img class="boot-mark" src="/assets/branding/binhamid-factory-logo.png" alt="مصنع بن حامد للبلوك والخرسانة الجاهزة">
      <h1>نظام رقابة مصنع بن حامد</h1>
      <p>تحميل النسخة التشغيلية وربط طبقة الحفظ السحابي ومركز الاتصال.</p>
      <div class="boot-line"></div>
      <div id="bootError" class="boot-error"></div>
    </section>
  </main>
  <iframe id="appFrame" title="نظام رقابة مصنع بن حامد" allow="unload; geolocation" src="/legacy.html?v=20260718-stable-shell-1"></iframe>
  <script>
  (function boot(){
    const frame=document.getElementById('appFrame'),screen=document.getElementById('bootScreen'),errorBox=document.getElementById('bootError');
    let completed=false,loadSequence=0;
    function fail(error){const message=String(error&&error.message||error||'تعذر تحميل البرنامج.');if(errorBox){errorBox.style.display='block';errorBox.textContent=message+'\nأعد تحميل الصفحة. بيانات المتصفح المحلية لم تُحذف.';}console.error('[BinHamid boot]',error);}
    function injectScript(doc,id,src,onerror){
      return new Promise((resolve,reject)=>{
        const existing=doc.getElementById(id);
        if(existing){if(existing.dataset.loaded==='1')return resolve(existing);existing.addEventListener('load',()=>resolve(existing),{once:true});existing.addEventListener('error',()=>reject(new Error(onerror||`تعذر تحميل ${src}`)),{once:true});return;}
        const script=doc.createElement('script');script.id=id;script.src=src;script.async=false;script.onload=()=>{script.dataset.loaded='1';resolve(script);};script.onerror=()=>reject(new Error(onerror||`تعذر تحميل ${src}`));doc.body.appendChild(script);
      });
    }
    function openRequestedWorkspace(win,sequence){
      const target=new URL(location.href).searchParams.get('open')||'',allowed=['dashboard','movements','custody','fleet','maintenance','inventory','production','deliveries','safety','documents','reports','backup'];
      if(allowed.includes(target))setTimeout(()=>{if(sequence===loadSequence&&typeof win.opsGo==='function')win.opsGo(target);},100);
    }
    async function prepareFrame(doc,win,sequence){
      const statuses=[['','غير محدد'],['in_service','في الخدمة'],['parked','مركون / احتياطي'],['stopped','متوقف'],['maintenance','في الصيانة'],['out_of_service','خارج الخدمة'],['sold','مباع / مستبعد']];
      if(!Array.isArray(win.BH4_VEHICLE_STATUSES))win.BH4_VEHICLE_STATUSES=statuses;
      if(typeof win.bh4DieselExpected!=='function')win.bh4DieselExpected=function(v){const mode=String(v&&v.dieselExpected||'auto'),status=String(v&&v.operationalStatus||'');if(mode==='yes')return true;if(mode==='no')return false;if(status==='in_service')return true;if(['parked','stopped','maintenance','out_of_service','sold'].includes(status))return false;return null;};
      if(typeof win.bh4StatusChip!=='function')win.bh4StatusChip=function(v){const status=String(v&&v.operationalStatus||''),entry=win.BH4_VEHICLE_STATUSES.find(x=>x[0]===status)||win.BH4_VEHICLE_STATUSES[0],cls=({in_service:'active',parked:'parked',maintenance:'maintenance',stopped:'stopped',out_of_service:'out',sold:'out'})[status]||'';return '<span class="bh4-status '+cls+'">'+entry[1]+'</span>';};
      try{if(typeof win.rVeh==='function')win.rVeh();}catch(error){console.error('[BinHamid] تعذر إعادة عرض سجل المركبات.',error);}
      if(!doc.getElementById('binhamid-cloud-style')){const link=doc.createElement('link');link.id='binhamid-cloud-style';link.rel='stylesheet';link.href='/assets/cloud-control.css?v=20260718-stable-shell-1';doc.head.appendChild(link);}
      const load=(id,src,error)=>injectScript(doc,id,src,error).catch(reason=>{console.error('[BinHamid]',reason);return null;});
      await load('binhamid-cloud-device-autolink','/assets/cloud-device-autolink.js?v=20260718-stable-shell-1','تعذر تحميل الربط التلقائي للجهاز.');
      await Promise.resolve(win.bhCloudDeviceReady).catch(error=>console.error('[BinHamid] تعذر إنشاء جلسة الجهاز التلقائية.',error));
      await injectScript(doc,'binhamid-cloud-script','/assets/cloud-control.js?v=20260718-stable-shell-1','تعذر تحميل مركز الاتصال، بينما النسخة الأساسية ما زالت متاحة.');
      const extensions=[
        ['binhamid-cloud-navigation-fix','/assets/cloud-control-navigation-fix.js?v=20260716-4'],['binhamid-attendance-control','/assets/attendance-control.js?v=20260716-2'],['binhamid-conversation-control','/assets/cloud-conversations.js?v=20260716-2'],['binhamid-bot-activity-dashboard','/assets/bot-activity-dashboard.js?v=20260718-1'],['binhamid-operations-control','/assets/cloud-operations.js?v=20260716-2'],['binhamid-operations-actions','/assets/cloud-operations-actions.js?v=20260716-1'],['binhamid-reports-control','/assets/cloud-reports.js?v=20260716-1'],['binhamid-user-roles','/assets/cloud-user-roles.js?v=20260716-1'],['binhamid-daily-summary-parser','/assets/daily-summary-parser.js?v=20260717-3'],['binhamid-existing-daily-import-fix','/assets/existing-daily-import-fix.js?v=20260717-2'],['binhamid-declarations-customer-ledger-fix','/assets/declarations-customer-ledger-fix.js?v=20260717-1'],['binhamid-import-review-guard','/assets/import-review-guard.js?v=20260717-1'],['binhamid-daily-report-source','/assets/daily-report-source-of-truth.js?v=20260717-final-acceptance-19'],['binhamid-telegram-site-two-way','/assets/telegram-site-two-way.js?v=20260718-2'],['binhamid-owner-web-login','/assets/owner-web-login.js?v=20260718-3'],['binhamid-factory-reset-cloud','/assets/factory-reset-cloud.js?v=20260718-1'],['binhamid-customer-opening-balances','/assets/customer-opening-balances.js?v=20260718-1'],['binhamid-fleet-attendance-status','/assets/fleet-attendance-status.js?v=20260718-1'],['binhamid-internal-fuel-control','/assets/internal-fuel-control.js?v=20260718-1'],['binhamid-governance-entry','/assets/governance-entry.js?v=20260717-final-acceptance-19']
      ];
      await Promise.all(extensions.map(([id,src])=>load(id,src,`تعذر تحميل ${id}`)));
      if(sequence!==loadSequence)return;
      openRequestedWorkspace(win,sequence);
    }
    frame.addEventListener('load',async function(){
      const sequence=++loadSequence;frame.style.visibility='hidden';frame.style.opacity='0';
      try{const doc=frame.contentDocument,win=frame.contentWindow;if(!doc||!doc.head||!doc.body||!win)throw new Error('تعذر الوصول إلى النسخة التشغيلية.');await prepareFrame(doc,win,sequence);if(sequence!==loadSequence)return;completed=true;frame.style.visibility='visible';requestAnimationFrame(()=>{frame.style.opacity='1';});screen?.remove();}
      catch(error){if(sequence===loadSequence){frame.style.visibility='visible';frame.style.opacity='1';fail(error);}}
    });
    frame.addEventListener('error',()=>fail(new Error('تعذر تحميل النسخة التشغيلية.')));
    setTimeout(()=>{if(!completed)fail(new Error('استغرق التحميل وقتًا أطول من المتوقع.'));},20000);
  })();
  </script>
</body>
</html>
