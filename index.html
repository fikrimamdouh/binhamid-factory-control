<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>نظام رقابة مصنع بن حامد</title>
  <style>
    html,body{height:100%;margin:0;background:#f7f3ec;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;color:#163746}
    .boot{height:100%;display:grid;place-items:center;padding:24px;text-align:center}
    .boot-card{width:min(520px,92vw);background:#fff;border:1px solid #e2dcd1;border-radius:16px;padding:28px;box-shadow:0 18px 50px rgba(11,34,51,.12)}
    .boot-mark{width:56px;height:56px;border-radius:15px;margin:0 auto 14px;background:#0b2233;color:#e6c982;display:grid;place-items:center;font-weight:900;font-size:22px}
    .boot h1{font-size:20px;margin:0 0 8px}.boot p{font-size:13px;color:#697b84;margin:0;line-height:1.8}
    .boot-line{height:4px;background:#edf1f2;border-radius:8px;overflow:hidden;margin-top:18px}.boot-line:before{content:"";display:block;width:35%;height:100%;background:#a97926;animation:load 1s infinite alternate ease-in-out}@keyframes load{to{transform:translateX(-185%)}}
    .boot-error{color:#922f2f;background:#fff1f1;border:1px solid #edcccc;padding:12px;border-radius:10px;margin-top:14px;display:none;white-space:pre-wrap;text-align:right}
  </style>
</head>
<body>
  <main class="boot">
    <section class="boot-card">
      <div class="boot-mark">BH</div>
      <h1>نظام رقابة مصنع بن حامد</h1>
      <p>تحميل النسخة التشغيلية وربط طبقة الحفظ السحابي ومركز الاتصال.</p>
      <div class="boot-line"></div>
      <div id="bootError" class="boot-error"></div>
    </section>
  </main>
  <script>
  (async function boot(){
    try{
      const response=await fetch('/legacy.html?v=20260715-cloud-foundation-1',{cache:'no-store'});
      if(!response.ok)throw new Error('تعذر تحميل النسخة التشغيلية: '+response.status);
      let html=await response.text();
      const head=`<link rel="stylesheet" href="/assets/cloud-control.css?v=20260715-1">`;
      const tail=`<script src="/assets/cloud-control.js?v=20260715-1"><\/script>`;
      if(!/<\/head>/i.test(html)||!/<\/body>/i.test(html))throw new Error('النسخة التشغيلية غير مكتملة.');
      html=html.replace(/<\/head>/i,head+'</head>').replace(/<\/body>/i,tail+'</body>');
      document.open();document.write(html);document.close();
    }catch(error){
      const box=document.getElementById('bootError');
      if(box){box.style.display='block';box.textContent=String(error&&error.message||error)+'\nأعد تحميل الصفحة. إذا استمر الخطأ افتح النسخة الاحتياطية المحلية.';}
      console.error('[BinHamid boot]',error);
    }
  })();
  </script>
</body>
</html>
