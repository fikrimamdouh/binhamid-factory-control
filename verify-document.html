<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>التحقق من مستند — مصنع بن حامد</title><style>*{box-sizing:border-box}body{margin:0;background:#f4f1e9;color:#173746;font-family:system-ui,-apple-system,"Segoe UI",sans-serif;min-height:100vh;display:grid;place-items:center;padding:20px}.card{width:min(660px,100%);background:#fff;border:1px solid #d9dfdf;border-radius:18px;padding:24px;box-shadow:0 16px 45px rgba(16,47,64,.1)}h1{font-size:22px;margin:0 0 8px}.muted{color:#697b84;font-size:13px;line-height:1.8}.search{display:flex;gap:8px;margin:18px 0}input{flex:1;border:1px solid #cdd7d9;border-radius:10px;padding:12px;font:inherit;text-transform:uppercase}button{border:0;border-radius:10px;padding:12px 15px;background:#123b50;color:#fff;font-weight:800}.result{margin-top:16px;border-radius:12px;padding:15px;display:none}.result.ok{display:block;background:#e5f3ea;color:#185d40}.result.bad{display:block;background:#fae6e6;color:#8a2929}.grid{display:grid;grid-template-columns:150px 1fr;gap:8px;margin-top:14px}.grid b,.grid span{padding:8px;border-bottom:1px solid rgba(0,0,0,.08);overflow-wrap:anywhere}.code{font-family:monospace;letter-spacing:2px}@media(max-width:560px){.search{display:grid}.grid{grid-template-columns:1fr}.grid b{padding-bottom:0;border:0}}</style></head><body><main class="card"><h1>التحقق من مستند مصنع بن حامد</h1><p class="muted">أدخل رمز التحقق المكتوب أسفل التقرير. تظهر بيانات التسجيل فقط ولا تُعرض محتويات مالية أو تشغيلية حساسة.</p><div class="search"><input id="code" placeholder="رمز التحقق"><button id="check">تحقق</button></div><section id="result" class="result"></section><p class="muted"><a href="/">العودة إلى البرنامج</a></p></main><script>(function(){const input=document.getElementById('code'),box=document.getElementById('result');const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));async function check(){const code=input.value.trim().toUpperCase();if(!code)return;box.className='result';box.style.display='block';box.textContent='جاري التحقق...';try{const r=await fetch('/api/documents/verify?code='+encodeURIComponent(code),{cache:'no-store'}),d=await r.json();if(!r.ok)throw new Error(d.error||'المستند غير موجود');const x=d.document;box.style.display='';box.className='result '+(d.valid?'ok':'bad');box.innerHTML=`<b>${d.valid?'المستند مسجل وساري':'المستند غير ساري'}</b><div class="grid"><b>الرمز</b><span class="code">${esc(x.verification_code)}</span><b>العنوان</b><span>${esc(x.title)}</span><b>النوع</b><span>${esc(x.document_type)}</span><b>طالب التقرير</b><span>${esc(x.requested_by_name||'—')}</span><b>تاريخ الإنشاء</b><span>${esc(new Date(x.created_at).toLocaleString('ar-SA',{timeZone:'Asia/Riyadh'}))}</span><b>الحالة</b><span>${esc(x.status)}</span><b>بصمة المحتوى</b><span class="code">${esc(x.content_hash)}</span>${x.revoke_reason?`<b>سبب الإلغاء</b><span>${esc(x.revoke_reason)}</span>`:''}</div>`}catch(e){box.style.display='';box.className='result bad';box.textContent=e.message}}document.getElementById('check').onclick=check;input.onkeydown=e=>{if(e.key==='Enter')check()};const code=new URLSearchParams(location.search).get('code');if(code){input.value=code;check()}})();</script></body></html>
