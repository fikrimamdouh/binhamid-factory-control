<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>القيود والأستاذ — مصنع بن حامد</title>
<style>
:root{--ink:#173746;--gold:#a97926;--bg:#f5f1e9;--card:#fff;--muted:#687b84;--bad:#a4372d;--ok:#247047}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:Tahoma,Arial,sans-serif;color:var(--ink)}header{background:#0d2c3d;color:#fff;padding:18px 4vw;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:2}header h1{font-size:20px;margin:0}header a{color:#f0d998;text-decoration:none}.sp{flex:1}.wrap{max-width:1400px;margin:auto;padding:22px 3vw}.toolbar,.cards,.card{background:var(--card);border:1px solid #ddd5c8;border-radius:12px}.toolbar{padding:12px;display:flex;gap:8px;flex-wrap:wrap;align-items:end}.toolbar label{font-size:12px;color:var(--muted)}input,select,button{font:inherit;padding:9px 10px;border:1px solid #c9c2b6;border-radius:8px;background:#fff}button{background:#173746;color:#fff;cursor:pointer}.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;overflow:hidden;margin:14px 0}.kpi{padding:15px;background:#fff}.kpi b{display:block;font-size:21px;margin-top:5px}.card{padding:14px;overflow:auto}table{width:100%;border-collapse:collapse;font-size:12px}th,td{border-bottom:1px solid #e4dfd6;padding:8px;text-align:right;white-space:nowrap}th{background:#edf1f2;position:sticky;top:0}.bad{color:var(--bad)}.ok{color:var(--ok)}.muted{color:var(--muted)}#login{display:none;background:#fff1df;border:1px solid #e4bd79;padding:12px;border-radius:10px;margin-bottom:12px}@media(max-width:800px){.cards{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<header><h1>القيود اليومية والأستاذ العام</h1><span class="sp"></span><a href="/">البرنامج</a><a href="/control-center.html">مركز الرقابة</a></header>
<main class="wrap">
<div id="login"><b>يلزم تسجيل دخول الإدارة.</b><div style="margin-top:8px"><input id="tokenInput" type="password" placeholder="رمز الإدارة المحفوظ في Vercel"><button onclick="saveToken()">حفظ واختبار</button></div></div>
<section class="toolbar"><label>العرض<br><select id="mode"><option value="entries">القيود اليومية</option><option value="trial">ميزان المراجعة</option><option value="ledger">الأستاذ العام</option><option value="integrity">فحص التوازن</option></select></label><label>من<br><input id="from" type="date"></label><label>إلى<br><input id="to" type="date"></label><label>كود العميل<br><input id="customer" placeholder="اختياري"></label><button onclick="loadData()">تحديث</button><button onclick="print()">طباعة</button></section>
<section class="cards"><div class="kpi">عدد القيود<b id="entries">—</b></div><div class="kpi">إجمالي المدين<b id="debit">—</b></div><div class="kpi">إجمالي الدائن<b id="credit">—</b></div><div class="kpi">حالة التوازن<b id="balanced">—</b></div></section>
<section class="card"><div id="message" class="muted">جارٍ التحميل...</div><table id="table"></table></section>
</main>
<script>
const TK='binhamid_cloud_access_token',money=v=>Number(v||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}),esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function token(){try{const x=localStorage.getItem(TK)||sessionStorage.getItem('binhamid_admin_token')||'';return x==='device-session'?'':x}catch{return''}}function saveToken(){const x=document.getElementById('tokenInput').value.trim();if(x)localStorage.setItem(TK,x);loadData()}
function headers(){return token()?{Authorization:'Bearer '+token()}:{};}function setKpi(e,d,c,b){entries.textContent=e??'—';debit.textContent=d===undefined?'—':money(d);credit.textContent=c===undefined?'—':money(c);balanced.textContent=b===undefined?'—':b?'متوازن':'غير متوازن';balanced.className=b===undefined?'':b?'ok':'bad'}
function renderEntries(data){const rows=data.entries||[];setKpi(data.summary?.entries,data.summary?.debit,data.summary?.credit,data.summary?.balanced);table.innerHTML='<thead><tr><th>التاريخ</th><th>المرجع</th><th>البيان</th><th>الحساب</th><th>المدين</th><th>الدائن</th><th>العميل</th><th>المصدر</th></tr></thead><tbody>'+rows.flatMap(e=>(e.journal_entry_lines||[]).map(l=>`<tr><td>${esc(e.entry_date)}</td><td>${esc(e.reference_no)}</td><td>${esc(e.description)}</td><td>${esc(l.chart_of_accounts?.account_code)} — ${esc(l.chart_of_accounts?.account_name_ar)}</td><td>${money(l.debit)}</td><td>${money(l.credit)}</td><td>${esc(l.customer_external_id||'')}</td><td>${esc(e.source_type)}</td></tr>`)).join('')+'</tbody>'}
function renderTrial(data){setKpi(data.rows?.length,data.totals?.debit,data.totals?.credit,data.totals?.balanced);table.innerHTML='<thead><tr><th>الكود</th><th>الحساب</th><th>النوع</th><th>المدين</th><th>الدائن</th><th>الرصيد</th></tr></thead><tbody>'+(data.rows||[]).map(r=>`<tr><td>${esc(r.account_code)}</td><td>${esc(r.account_name_ar)}</td><td>${esc(r.account_type)}</td><td>${money(r.total_debit)}</td><td>${money(r.total_credit)}</td><td>${money(r.balance)}</td></tr>`).join('')+'</tbody>'}
function renderLedger(data){const rows=data.rows||[],d=rows.reduce((s,r)=>s+Number(r.debit||0),0),c=rows.reduce((s,r)=>s+Number(r.credit||0),0);setKpi(rows.length,d,c,Number(d.toFixed(2))===Number(c.toFixed(2)));table.innerHTML='<thead><tr><th>التاريخ</th><th>المرجع</th><th>الحساب</th><th>البيان</th><th>المدين</th><th>الدائن</th><th>الرصيد الجاري</th><th>العميل</th></tr></thead><tbody>'+rows.map(r=>`<tr><td>${esc(r.entry_date)}</td><td>${esc(r.reference_no)}</td><td>${esc(r.account_code)} — ${esc(r.account_name_ar)}</td><td>${esc(r.memo||r.description)}</td><td>${money(r.debit)}</td><td>${money(r.credit)}</td><td>${money(r.running_balance)}</td><td>${esc(r.customer_external_id||'')}</td></tr>`).join('')+'</tbody>'}
function renderIntegrity(data){const x=data.integrity||{};setKpi(x.posted_entries,x.total_debit,x.total_credit,Number(x.unbalanced_entries||0)===0&&Number(x.entries_without_lines||0)===0&&Number(x.total_debit||0)===Number(x.total_credit||0));table.innerHTML='<thead><tr><th>الفحص</th><th>النتيجة</th></tr></thead><tbody>'+Object.entries(x).map(([k,v])=>`<tr><td>${esc(k)}</td><td>${esc(v)}</td></tr>`).join('')+'</tbody>'}
async function loadData(){const mode=document.getElementById('mode').value,p=new URLSearchParams({mode});if(from.value)p.set('from',from.value);if(to.value)p.set('to',to.value);if(customer.value)p.set('customer',customer.value.trim());message.textContent='جارٍ التحميل...';try{const r=await fetch('/api/accounting?'+p,{headers:headers(),credentials:'same-origin',cache:'no-store'}),d=await r.json();if(!r.ok)throw Object.assign(new Error(d.error||d.message||'تعذر التحميل'),{status:r.status});login.style.display='none';message.textContent='';if(mode==='trial')renderTrial(d);else if(mode==='ledger')renderLedger(d);else if(mode==='integrity')renderIntegrity(d);else renderEntries(d)}catch(e){message.textContent=e.message;if(e.status===401||e.status===403)login.style.display='block';setKpi()}}
mode.addEventListener('change',loadData);loadData();
</script>
</body></html>
