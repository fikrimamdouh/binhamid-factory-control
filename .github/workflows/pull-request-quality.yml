name: Pull Request Quality Gate

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pull-request-quality-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
      - name: Install dependencies
        run: npm install --ignore-scripts --no-audit --no-fund
      - name: Check JavaScript syntax
        run: |
          set -euo pipefail
          node --check api/_lib/control-readiness.js
          node --check api/_lib/routes/control-center.js
          node --check api/router.js
      - name: Run enterprise quality gate
        run: npm run check
