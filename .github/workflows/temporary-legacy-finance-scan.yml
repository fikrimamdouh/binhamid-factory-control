name: Temporary Legacy Finance Scan

on:
  push:
    branches:
      - feat/complete-operational-roadmap

permissions:
  contents: write

jobs:
  scan:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/complete-operational-roadmap
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Extract summary and declaration functions
        run: |
          python - <<'PY'
          from pathlib import Path
          lines=Path('legacy.html').read_text(encoding='utf-8').splitlines()
          out_dir=Path('debug'); out_dir.mkdir(exist_ok=True)
          def extract(name,anchor,before,after):
              out=[]
              for hit,line in enumerate(lines):
                  if anchor not in line: continue
                  start=max(0,hit-before); end=min(len(lines),hit+after)
                  out.append(f'===== {anchor} / ORIGINAL {start+1}-{end} =====')
                  out.extend(f'{idx+1:05d}: {lines[idx]}' for idx in range(start,end))
              (out_dir/name).write_text('\n'.join(out),encoding='utf-8')
          extract('bh-summary-import.txt','function opsImportDailySummary',20,190)
          extract('bh-print-declaration.txt','function opsPrintDailySalesDeclaration',25,180)
          extract('bh-sales-responsible.txt','function opsSalesResponsible',25,120)
          PY
      - name: Commit scan output
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add debug/bh-summary-import.txt debug/bh-print-declaration.txt debug/bh-sales-responsible.txt
          git diff --cached --quiet && exit 0
          git commit -m 'chore: add summary and declaration diagnostics'
          git push origin HEAD:feat/complete-operational-roadmap
