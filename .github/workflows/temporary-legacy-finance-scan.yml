name: Temporary Legacy Finance Scan

on:
  push:
    branches:
      - feat/complete-operational-roadmap

permissions:
  contents: write

jobs:
  scan:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/complete-operational-roadmap
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Extract small exact legacy functions
        run: |
          python - <<'PY'
          from pathlib import Path

          lines=Path('legacy.html').read_text(encoding='utf-8').splitlines()
          out_dir=Path('debug'); out_dir.mkdir(exist_ok=True)

          def extract(name, anchors, before=15, after=120):
              out=[]
              for anchor in anchors:
                  hits=[i for i,line in enumerate(lines) if anchor in line]
                  for hit in hits:
                      start=max(0,hit-before); end=min(len(lines),hit+after)
                      out.append(f'===== {anchor} / ORIGINAL {start+1}-{end} =====')
                      out.extend(f'{idx+1:05d}: {lines[idx]}' for idx in range(start,end))
              (out_dir/name).write_text('\n'.join(out),encoding='utf-8')

          extract('bh-client-ledger.txt',['function bhClientLedger','window.bhClientLedger'],12,105)
          extract('bh-sales-declaration.txt',['function opsSalesDeclarationRows','function opsPrintDailySalesDeclaration'],20,145)
          extract('bh-import-employees.txt',['function opsImportDailyMovement','blockEmployeeId','concreteEmployeeId'],18,100)
          extract('bh-customer-page.txt',['function rCli','bhClientLedger(c.id)','function clientPortfolioForEmployee'],18,110)
          PY
      - name: Commit scan output
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add debug/bh-client-ledger.txt debug/bh-sales-declaration.txt debug/bh-import-employees.txt debug/bh-customer-page.txt
          git diff --cached --quiet && exit 0
          git commit -m 'chore: split exact legacy finance excerpts'
          git push origin HEAD:feat/complete-operational-roadmap
