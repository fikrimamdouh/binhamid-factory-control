name: Temporary Legacy Finance Scan

on:
  push:
    branches:
      - feat/complete-operational-roadmap

permissions:
  contents: write

jobs:
  scan:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/complete-operational-roadmap
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Extract exact legacy functions
        run: |
          python - <<'PY'
          from pathlib import Path

          lines=Path('legacy.html').read_text(encoding='utf-8').splitlines()
          anchors=[
            'function rCli',
            'function bhClientLedger',
            'window.bhClientLedger',
            'function clientPortfolioForEmployee',
            'function opsSalesDeclarationRows',
            'function opsPrintDailySalesDeclaration',
            'function opsImportDailyMovement',
            'function opsSalesKind',
            'function opsCustomerExposure',
            'blockEmployeeId',
            'concreteEmployeeId'
          ]
          out=[]
          seen=[]
          for anchor in anchors:
            hits=[i for i,line in enumerate(lines) if anchor in line]
            for hit in hits:
              start=max(0,hit-25); end=min(len(lines),hit+90)
              if any(start>=a and end<=b for a,b in seen):
                continue
              seen.append((start,end))
              out.append(f'===== ANCHOR {anchor} / LINES {start+1}-{end} =====')
              out.extend(f'{idx+1:05d}: {lines[idx]}' for idx in range(start,end))
          Path('debug').mkdir(exist_ok=True)
          Path('debug/legacy-exact-finance-functions.txt').write_text('\n'.join(out),encoding='utf-8')
          PY
      - name: Commit scan output
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add debug/legacy-exact-finance-functions.txt
          git diff --cached --quiet && exit 0
          git commit -m 'chore: add exact legacy finance functions'
          git push origin HEAD:feat/complete-operational-roadmap
