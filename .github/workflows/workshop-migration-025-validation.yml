name: Workshop Migration 025 Validation

on:
  workflow_dispatch:
  push:
    branches:
      - agent/workshop-data-model-025
    paths:
      - '.github/workflows/workshop-migration-025-validation.yml'
      - 'supabase/migrations/025_workshop_central_data_model.sql'
      - 'scripts/workshop-migration-verify.mjs'
      - 'scripts/audit-migrations.mjs'
      - 'tests/workshop-migration-025.test.mjs'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/workshop-migration-025-validation.yml'
      - 'supabase/migrations/025_workshop_central_data_model.sql'
      - 'scripts/workshop-migration-verify.mjs'
      - 'scripts/audit-migrations.mjs'
      - 'tests/workshop-migration-025.test.mjs'

permissions:
  contents: read
  statuses: write

concurrency:
  group: binhamid-workshop-migration-025-validation
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: workshop_validation
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d workshop_validation"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/workshop_validation
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Validate repository contracts
        run: |
          set -euo pipefail
          npm install --ignore-scripts --no-audit --no-fund
          node --check scripts/workshop-migration-verify.mjs
          npm run audit:migrations
          npm test

      - name: Install PostgreSQL client
        run: sudo apt-get update -qq && sudo apt-get install -y postgresql-client

      - name: Create schema 24 workshop fixture
        shell: bash
        run: |
          set -euo pipefail
          psql "$TEST_DATABASE_URL" -X -v ON_ERROR_STOP=1 <<'SQL'
          create extension if not exists pgcrypto;

          create table public.migration_history(
            version integer primary key,
            migration_name text not null,
            applied_at timestamptz not null default now()
          );
          insert into public.migration_history(version,migration_name)
          select value,concat('fixture_',lpad(value::text,3,'0')) from generate_series(1,24) value;

          create table public.unified_assets(
            id uuid primary key default gen_random_uuid(),
            external_id text not null unique,
            asset_type text not null default 'vehicle',
            asset_name text,
            plate_no text,
            asset_no text,
            operational_status text not null default 'in_service',
            active boolean not null default true,
            metadata jsonb not null default '{}'::jsonb,
            created_at timestamptz not null default now(),
            updated_at timestamptz not null default now()
          );

          create table public.maintenance_orders(
            id uuid primary key default gen_random_uuid(),
            reference_no text not null unique,
            vehicle_external_id text,
            plate_snapshot text,
            problem text,
            diagnosis text,
            priority text not null default 'normal',
            vehicle_stopped boolean not null default false,
            status text not null default 'draft' check(status in ('draft','reported','inspection','quotation_required','approval_pending','approved','in_repair','testing','completed','cancelled')),
            reported_by uuid,
            confirmed_by uuid,
            approved_by uuid,
            source_channel text,
            source_chat_id text,
            source_message_id text,
            voice_path text,
            estimated_cost numeric(18,2),
            actual_cost numeric(18,2),
            reported_at timestamptz,
            confirmed_at timestamptz,
            approved_at timestamptz,
            closed_at timestamptz,
            cancelled_at timestamptz,
            cancelled_by uuid,
            created_at timestamptz not null default now(),
            updated_at timestamptz not null default now()
          );

          create table public.maintenance_updates(
            id uuid primary key default gen_random_uuid(),
            maintenance_id uuid not null references public.maintenance_orders(id) on delete restrict,
            status text not null,
            note text,
            created_by uuid,
            source_channel text,
            source_chat_id text,
            source_message_id text,
            created_at timestamptz not null default now()
          );

          create table public.operational_records(
            id uuid primary key default gen_random_uuid(),
            reference_no text not null unique,
            entity_type text not null,
            department text not null,
            status text not null,
            title text,
            summary text,
            amount numeric(18,2) not null default 0,
            payload jsonb not null default '{}'::jsonb,
            created_by text,
            assigned_to text,
            source_channel text,
            source_chat_id text,
            source_message_id text,
            created_at timestamptz not null default now(),
            updated_at timestamptz not null default now(),
            closed_at timestamptz
          );

          create table public.audit_log(
            id uuid primary key default gen_random_uuid(),
            actor_type text,
            actor_id text,
            action text not null,
            entity_type text,
            entity_id text,
            details jsonb not null default '{}'::jsonb,
            created_at timestamptz not null default now()
          );
          SQL

      - name: Seed the verified split-source pattern
        shell: bash
        run: |
          set -euo pipefail
          psql "$TEST_DATABASE_URL" -X -v ON_ERROR_STOP=1 <<'SQL'
          insert into public.maintenance_orders(reference_no,plate_snapshot,problem,status,priority,vehicle_stopped,source_channel,reported_at)
          values
            ('BH-RO-2026-90001','أصل بدون لوحة','بلاغ اختبار ملغي','cancelled','normal',false,'telegram',now()),
            ('BH-SPR-2026-90002','طلب قطع عام','طلب قطعة اختبار','quotation_required','urgent',false,'telegram',now());

          insert into public.operational_records(reference_no,entity_type,department,status,title,summary,created_by)
          values
            ('WS-ORPHAN-90001','workshop','workshop','reported','سجل ورشة قديم 1','بدون أمر صيانة','test'),
            ('WS-ORPHAN-90002','maintenance','workshop','inspection','سجل ورشة قديم 2','بدون أمر صيانة','test'),
            ('WS-ORPHAN-90003','spare_parts_request','workshop','quotation_required','سجل ورشة قديم 3','بدون أمر صيانة','test'),
            ('WS-ORPHAN-90004','workshop','workshop','reported','سجل ورشة قديم 4','بدون أمر صيانة','test');

          insert into public.audit_log(actor_type,actor_id,action,entity_type,entity_id,details)
          values('telegram','mechanic-1','mechanic_daily_report','workshop_daily_report','WDR-TEST-1',jsonb_build_object('report_date',current_date::text,'report_text','تقرير اختبار','telegram_user_id','mechanic-1'));
          SQL

      - name: Apply migration 025 atomically
        shell: bash
        run: |
          set -uo pipefail
          set +e
          psql "$TEST_DATABASE_URL" -X -v ON_ERROR_STOP=1 --single-transaction --file supabase/migrations/025_workshop_central_data_model.sql > workshop-migration-apply.log 2>&1
          status=$?
          set -e
          tail -n 160 workshop-migration-apply.log || true
          exit "$status"

      - name: Verify preservation, linkage and target schema
        env:
          SUPABASE_DB_URL: ${{ env.TEST_DATABASE_URL }}
          EXPECTED_MIN_MAINTENANCE_ORDERS: '2'
          EXPECTED_MIN_OPERATIONAL_RECORDS: '4'
          WORKSHOP_MIGRATION_RESULT: workshop-migration-result.json
        run: node scripts/workshop-migration-verify.mjs

      - name: Assert baseline reconciliation outcomes
        shell: bash
        run: |
          set -euo pipefail
          test "$(psql "$TEST_DATABASE_URL" -X -t -A -c 'select count(*) from public.maintenance_orders')" -eq 2
          test "$(psql "$TEST_DATABASE_URL" -X -t -A -c 'select count(*) from public.operational_records')" -eq 6
          test "$(psql "$TEST_DATABASE_URL" -X -t -A -c "select count(*) from public.maintenance_reconciliation_queue where issue_type='orphan_operational_record' and status='pending'")" -eq 4
          test "$(psql "$TEST_DATABASE_URL" -X -t -A -c "select count(*) from public.maintenance_reconciliation_queue where issue_type='missing_operational_link' and status='auto_resolved'")" -eq 2
          test "$(psql "$TEST_DATABASE_URL" -X -t -A -c 'select count(*) from public.operational_records where maintenance_order_id is not null')" -eq 2
          test "$(psql "$TEST_DATABASE_URL" -X -t -A -c "select count(*) from public.workshop_daily_reports where source_channel='legacy'")" -eq 1

      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workshop-migration-025-validation-${{ github.run_id }}
          path: |
            workshop-migration-apply.log
            workshop-migration-result.json
          if-no-files-found: warn
          retention-days: 30

      - name: Publish validation status
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          HEAD_SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          JOB_STATUS: ${{ job.status }}
        run: |
          node <<'NODE'
          const success=process.env.JOB_STATUS==='success';
          const response=await fetch(`https://api.github.com/repos/${process.env.REPOSITORY}/statuses/${process.env.HEAD_SHA}`,{
            method:'POST',
            headers:{Accept:'application/vnd.github+json',Authorization:`Bearer ${process.env.GITHUB_TOKEN}`,'X-GitHub-Api-Version':'2022-11-28','Content-Type':'application/json'},
            body:JSON.stringify({state:success?'success':'failure',context:'workshop-migration-025:isolated',target_url:process.env.RUN_URL,description:success?'Schema 25 passed isolated migration validation.':'Schema 25 validation failed; no external database was modified.'})
          });
          if(!response.ok)throw new Error(`Status publication failed with HTTP ${response.status}`);
          NODE
