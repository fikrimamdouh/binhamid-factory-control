name: Encrypted Database Backup

on:
  workflow_dispatch:
  schedule:
    - cron: '17 23 * * *'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/database-backup.yml'
      - 'scripts/backup-supabase.mjs'

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    concurrency:
      group: binhamid-database-backup
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
      - name: Install PostgreSQL tools
        run: sudo apt-get update -qq && sudo apt-get install -y postgresql-client
      - name: Validate encrypted backup secrets
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          BACKUP_ENCRYPTION_KEY: ${{ secrets.BACKUP_ENCRYPTION_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SUPABASE_DB_URL"
          test -n "$BACKUP_ENCRYPTION_KEY"
          node <<'NODE'
          const raw=String(process.env.SUPABASE_DB_URL||'').trim();
          let url;
          try{url=new URL(raw);}catch{console.error('SUPABASE_DB_URL is not a valid PostgreSQL connection URL.');process.exit(1);}
          if(!['postgres:','postgresql:'].includes(url.protocol)){console.error('SUPABASE_DB_URL must start with postgresql:// or postgres://');process.exit(1);}
          if(!url.username||!url.password||url.password.includes('YOUR-PASSWORD')){console.error('SUPABASE_DB_URL must contain the real database user and password.');process.exit(1);}
          if(url.hostname.startsWith('db.')){console.error('SUPABASE_DB_URL is a Direct connection URL. GitHub runners require the Supabase Session pooler URL.');process.exit(1);}
          console.log(`Database connection target validated: ${url.hostname}:${url.port||'5432'}`);
          NODE
          pg_isready --dbname "$SUPABASE_DB_URL" --timeout=15
      - name: Create and upload backup
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_STORAGE_BUCKET: ${{ vars.SUPABASE_STORAGE_BUCKET || 'factory-documents' }}
          BACKUP_ENCRYPTION_KEY: ${{ secrets.BACKUP_ENCRYPTION_KEY }}
          BACKUP_RETENTION_DAYS: '30'
          BACKUP_STORAGE_PREFIX: backups
          BACKUP_ENVIRONMENT: production
          BACKUP_OUTPUT_DIR: backup-output
        shell: bash
        run: |
          set -euo pipefail
          node scripts/backup-supabase.mjs 2> >(tee backup-error.log >&2) | tee backup-result.jsonl
          test -s backup-result.jsonl
          test -n "$(find backup-output -maxdepth 1 -type f -name '*.enc' -size +64c -print -quit)"
          test -n "$(find backup-output -maxdepth 1 -type f -name '*.manifest.json' -size +32c -print -quit)"
      - name: Upload encrypted recovery artifact
        uses: actions/upload-artifact@v4
        with:
          name: encrypted-database-backup-${{ github.run_id }}
          path: |
            backup-output/*.enc
            backup-output/*.manifest.json
            backup-result.jsonl
          if-no-files-found: error
          retention-days: 7
