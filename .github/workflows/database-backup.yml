name: Encrypted Database Backup

on:
  workflow_dispatch:
  schedule:
    - cron: '17 23 * * *'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/database-backup.yml'
      - 'scripts/backup-supabase.mjs'

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    concurrency:
      group: binhamid-database-backup
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
      - name: Install PostgreSQL tools
        run: sudo apt-get update -qq && sudo apt-get install -y postgresql-client
      - name: Validate encrypted backup secrets and connection
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          BACKUP_ENCRYPTION_KEY: ${{ secrets.BACKUP_ENCRYPTION_KEY }}
          SUPABASE_POOLER_HOST: ${{ vars.SUPABASE_POOLER_HOST }}
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const { appendFileSync, writeFileSync } = require('node:fs');
          const { spawnSync } = require('node:child_process');

          const diagnosticPath = 'backup-diagnostic.json';
          const checkedAt = new Date().toISOString();
          const writeDiagnostic = (ok, stage, code, reason, extra = {}) => {
            const payload = {
              format: 'binhamid-backup-diagnostic-v1',
              checkedAt,
              ok,
              stage,
              code,
              reason,
              ...extra,
            };
            writeFileSync(diagnosticPath, `${JSON.stringify(payload, null, 2)}\n`, { mode: 0o600 });
          };
          const fail = (stage, code, reason, extra = {}) => {
            writeDiagnostic(false, stage, code, reason, extra);
            console.error(`[backup-validation] ${code}: ${reason}`);
            process.exit(1);
          };
          const decode = value => {
            try {
              return decodeURIComponent(value);
            } catch {
              fail('url-validation', 'DATABASE_URL_ENCODING_INVALID', 'The database username or password contains invalid URL encoding.');
            }
          };
          const classifyConnectionError = stderr => {
            const text = String(stderr || '').toLowerCase();
            if (text.includes('tenant or user not found')) return ['SESSION_POOLER_USERNAME_REJECTED', 'The Session pooler rejected the configured tenant or username.'];
            if (text.includes('password authentication failed')) return ['DATABASE_AUTHENTICATION_FAILED', 'The database rejected the configured username or password.'];
            if (text.includes('could not translate host name')) return ['DATABASE_DNS_FAILED', 'The database hostname could not be resolved.'];
            if (text.includes('timeout expired') || text.includes('connection timed out')) return ['DATABASE_CONNECTION_TIMEOUT', 'The authenticated connection timed out.'];
            if (text.includes('connection refused')) return ['DATABASE_CONNECTION_REFUSED', 'The database endpoint refused the connection.'];
            if (text.includes('no route to host') || text.includes('network is unreachable')) return ['DATABASE_NETWORK_UNREACHABLE', 'The database network endpoint is unreachable from the runner.'];
            if (text.includes('does not exist')) return ['DATABASE_NAME_INVALID', 'The configured database name was rejected.'];
            if (text.includes('certificate') || text.includes('ssl')) return ['DATABASE_TLS_FAILED', 'The PostgreSQL TLS connection failed.'];
            return ['PSQL_CONNECTION_FAILED', 'The authenticated PostgreSQL connection test failed.'];
          };
          const probe = connectionUrl => {
            const target = new URL(connectionUrl);
            target.searchParams.set('sslmode', 'require');
            target.searchParams.set('connect_timeout', '5');
            const result = spawnSync('psql', [target.toString(), '-X', '-t', '-A', '-v', 'ON_ERROR_STOP=1', '-c', 'select 1;'], {
              encoding: 'utf8',
              env: process.env,
              stdio: ['ignore', 'pipe', 'pipe'],
              timeout: 12000,
            });
            return {
              ok: !result.error && result.status === 0 && String(result.stdout || '').trim() === '1',
              status: result.status,
              error: result.error,
              stderr: String(result.stderr || ''),
              url: target.toString(),
            };
          };

          const raw = String(process.env.SUPABASE_DB_URL || '').trim();
          const encryptionKey = String(process.env.BACKUP_ENCRYPTION_KEY || '').trim();
          if (!raw) fail('configuration', 'SUPABASE_DB_URL_EMPTY', 'The database connection secret is empty.');
          if (!encryptionKey) fail('configuration', 'BACKUP_ENCRYPTION_KEY_EMPTY', 'The backup encryption secret is empty.');
          if (!process.env.GITHUB_ENV) fail('configuration', 'GITHUB_ENV_UNAVAILABLE', 'The runner environment file is unavailable.');

          let configured;
          try {
            configured = new URL(raw);
          } catch {
            fail('url-validation', 'DATABASE_URL_INVALID', 'The database connection secret is not a valid PostgreSQL URL.');
          }
          if (!['postgres:', 'postgresql:'].includes(configured.protocol)) {
            fail('url-validation', 'DATABASE_URL_PROTOCOL_INVALID', 'The database URL protocol must be PostgreSQL.');
          }
          if (!configured.username || !configured.password) {
            fail('url-validation', 'DATABASE_URL_CREDENTIALS_MISSING', 'The database URL must contain both username and password.');
          }

          const configuredUsername = decode(configured.username);
          const configuredPassword = decode(configured.password);
          if (!configuredPassword || configuredPassword.includes('YOUR-PASSWORD')) {
            fail('url-validation', 'DATABASE_URL_PASSWORD_PLACEHOLDER', 'The database URL still contains a missing or placeholder password.');
          }
          if (!configured.pathname || configured.pathname === '/') {
            fail('url-validation', 'DATABASE_NAME_MISSING', 'The database name is missing from the connection URL.');
          }

          const hostname = String(configured.hostname || '').toLowerCase();
          let effectiveUrl = '';
          let resolution = 'configured-session-pooler';

          if (hostname.endsWith('.pooler.supabase.com')) {
            const port = String(configured.port || '5432');
            if (port !== '5432') fail('url-validation', 'SESSION_POOLER_PORT_INVALID', 'The Session pooler must use port 5432.');
            if (!/^postgres\.[a-z0-9]+$/i.test(configuredUsername)) {
              fail('url-validation', 'SESSION_POOLER_USERNAME_INVALID', 'The Session pooler username must use the postgres.project-ref format.');
            }
            const result = probe(configured.toString());
            if (result.error) fail('authentication', 'PSQL_UNAVAILABLE', 'psql could not be executed.');
            if (!result.ok) {
              const [code, reason] = classifyConnectionError(result.stderr);
              fail('authentication', code, reason, { psqlExitCode: result.status ?? -1 });
            }
            effectiveUrl = result.url;
          } else {
            const directMatch = hostname.match(/^db\.([a-z0-9]+)\.supabase\.co$/i);
            if (!directMatch) {
              fail('url-validation', 'SESSION_POOLER_HOST_INVALID', 'The configured database host is neither a Supabase Direct host nor a Session pooler host.');
            }

            const projectRef = directMatch[1];
            const overrideHost = String(process.env.SUPABASE_POOLER_HOST || '').trim().toLowerCase();
            if (overrideHost && !/^aws-[0-9]+-[a-z0-9-]+\.pooler\.supabase\.com$/i.test(overrideHost)) {
              fail('url-validation', 'SESSION_POOLER_OVERRIDE_INVALID', 'The optional Session pooler host override is invalid.');
            }

            const regions = [
              'us-east-1',
              'eu-central-1',
              'ap-southeast-1',
              'us-west-1',
              'us-west-2',
              'us-east-2',
              'ca-central-1',
              'eu-west-1',
              'eu-west-2',
              'eu-west-3',
              'eu-central-2',
              'eu-north-1',
              'ap-south-1',
              'ap-northeast-1',
              'ap-northeast-2',
              'ap-southeast-2',
              'sa-east-1',
            ];
            const generatedHosts = [];
            for (const cluster of ['0', '1']) {
              for (const region of regions) generatedHosts.push(`aws-${cluster}-${region}.pooler.supabase.com`);
            }
            const candidateHosts = [...new Set([overrideHost, ...generatedHosts].filter(Boolean))];
            const observedCodes = new Set();

            for (const candidateHost of candidateHosts) {
              const candidate = new URL(configured.toString());
              candidate.protocol = 'postgresql:';
              candidate.username = `postgres.${projectRef}`;
              candidate.password = configuredPassword;
              candidate.hostname = candidateHost;
              candidate.port = '5432';
              const result = probe(candidate.toString());
              if (result.error) fail('authentication', 'PSQL_UNAVAILABLE', 'psql could not be executed.');
              if (result.ok) {
                effectiveUrl = result.url;
                resolution = 'derived-session-pooler';
                break;
              }
              observedCodes.add(classifyConnectionError(result.stderr)[0]);
            }

            if (!effectiveUrl) {
              let code = 'SESSION_POOLER_DISCOVERY_FAILED';
              let reason = 'No authenticated Session pooler endpoint could be resolved from the configured Direct URL.';
              if (observedCodes.has('DATABASE_AUTHENTICATION_FAILED')) {
                code = 'DATABASE_AUTHENTICATION_FAILED';
                reason = 'A Session pooler endpoint was reached, but the database rejected the configured password.';
              } else if (observedCodes.has('DATABASE_CONNECTION_TIMEOUT')) {
                code = 'SESSION_POOLER_CONNECTION_TIMEOUT';
                reason = 'Session pooler discovery did not complete because connection attempts timed out.';
              }
              fail('session-pooler-discovery', code, reason, { candidatesChecked: candidateHosts.length });
            }
          }

          const readiness = spawnSync('pg_isready', ['--dbname', effectiveUrl, '--timeout=15'], {
            encoding: 'utf8',
            env: process.env,
            stdio: ['ignore', 'pipe', 'pipe'],
          });
          if (readiness.error) fail('network-readiness', 'PG_ISREADY_UNAVAILABLE', 'pg_isready could not be executed.');
          if (readiness.status !== 0) {
            const codeByStatus = {
              1: ['PG_ISREADY_REJECTED', 'The database server rejected the readiness check.'],
              2: ['PG_ISREADY_NO_RESPONSE', 'The database server did not respond before the timeout.'],
              3: ['PG_ISREADY_INVALID_ATTEMPT', 'The readiness check could not make a valid connection attempt.'],
            };
            const [code, reason] = codeByStatus[readiness.status] || ['PG_ISREADY_FAILED', 'The database readiness check failed.'];
            fail('network-readiness', code, reason, { pgIsReadyExitCode: readiness.status });
          }

          process.stdout.write(`::add-mask::${effectiveUrl}\n`);
          appendFileSync(process.env.GITHUB_ENV, `SUPABASE_DB_URL=${effectiveUrl}\n`, { encoding: 'utf8', mode: 0o600 });
          writeDiagnostic(true, 'complete', 'CONNECTION_VALIDATED', 'An authenticated Supabase Session pooler connection is ready for the encrypted backup.', {
            resolution,
            pgIsReadyExitCode: readiness.status,
            psqlExitCode: 0,
          });
          console.log(`[backup-validation] CONNECTION_VALIDATED (${resolution})`);
          NODE
      - name: Upload safe backup diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backup-diagnostic-${{ github.run_id }}
          path: backup-diagnostic.json
          if-no-files-found: error
          retention-days: 7
      - name: Create encrypted backup
        env:
          BACKUP_ENCRYPTION_KEY: ${{ secrets.BACKUP_ENCRYPTION_KEY }}
          BACKUP_RETENTION_DAYS: '30'
          BACKUP_STORAGE_PREFIX: backups
          BACKUP_ENVIRONMENT: production
          BACKUP_OUTPUT_DIR: backup-output
        shell: bash
        run: |
          set -euo pipefail
          rm -rf backup-output
          mkdir -p backup-output
          : > backup-result.jsonl
          node scripts/backup-supabase.mjs 2> >(tee backup-error.log >&2) | tee backup-result.jsonl
      - name: Verify encrypted recovery files
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const { createHash } = require('node:crypto');
          const { basename, join } = require('node:path');
          const { readFileSync, readdirSync, statSync } = require('node:fs');

          const fail = message => {
            console.error(`[backup-verification] ${message}`);
            process.exit(1);
          };
          const directory = 'backup-output';
          const files = readdirSync(directory);
          const encryptedFiles = files.filter(name => name.endsWith('.enc'));
          const manifestFiles = files.filter(name => name.endsWith('.manifest.json'));
          const unencryptedFiles = files.filter(name => name.endsWith('.sql') || name.endsWith('.sql.gz'));
          if (unencryptedFiles.length) fail('unencrypted SQL output remains in backup-output');
          if (encryptedFiles.length !== 1) fail(`expected exactly one encrypted file, found ${encryptedFiles.length}`);
          if (manifestFiles.length !== 1) fail(`expected exactly one manifest file, found ${manifestFiles.length}`);

          const encryptedName = encryptedFiles[0];
          const encryptedPath = join(directory, encryptedName);
          const manifestPath = join(directory, manifestFiles[0]);
          const encryptedSize = statSync(encryptedPath).size;
          const manifestSize = statSync(manifestPath).size;
          if (encryptedSize <= 154) fail(`encrypted file is too small: ${encryptedSize} bytes`);
          if (manifestSize <= 32) fail(`manifest file is too small: ${manifestSize} bytes`);

          let manifest;
          try {
            manifest = JSON.parse(readFileSync(manifestPath, 'utf8'));
          } catch {
            fail('manifest is not valid JSON');
          }
          if (manifest.format !== 'binhamid-backup-v1') fail('manifest format is invalid');
          if (manifest.encrypted !== true) fail('manifest does not mark the backup as encrypted');
          if (manifest.fileName !== encryptedName) fail('manifest fileName does not match the encrypted file');
          if (!/^[a-f0-9]{64}$/i.test(String(manifest.checksumSha256 || ''))) fail('manifest checksum is invalid');

          const checksum = createHash('sha256').update(readFileSync(encryptedPath)).digest('hex');
          if (checksum !== manifest.checksumSha256) fail('encrypted file checksum does not match the manifest');

          const resultText = readFileSync('backup-result.jsonl', 'utf8').trim();
          if (!resultText) fail('backup-result.jsonl is empty');
          const resultLines = resultText.split(/\r?\n/).filter(Boolean);
          let result;
          try {
            result = JSON.parse(resultLines[resultLines.length - 1]);
          } catch {
            fail('backup-result.jsonl does not end with valid JSON');
          }
          if (result.ok !== true) fail('backup-result.jsonl does not report success');
          if (basename(String(result.file || '')) !== encryptedName) fail('backup result file does not match the encrypted file');
          if (Number(result.sizeBytes) !== encryptedSize) fail('backup result size does not match the encrypted file');
          if (result.checksumSha256 !== checksum) fail('backup result checksum does not match the encrypted file');
          if (basename(String(result.manifest || '')) !== manifestFiles[0]) fail('backup result manifest does not match the manifest file');
          if (result.storagePath !== null) fail('backup unexpectedly wrote to Supabase Storage');

          console.log(`[backup-verification] verified ${encryptedName} (${encryptedSize} bytes) with manifest and checksum`);
          NODE
      - name: Upload encrypted recovery artifact
        uses: actions/upload-artifact@v4
        with:
          name: encrypted-database-backup-${{ github.run_id }}
          path: |
            backup-output/*.enc
            backup-output/*.manifest.json
            backup-result.jsonl
          if-no-files-found: error
          retention-days: 7
