name: Encrypted Database Backup

on:
  workflow_dispatch:
  schedule:
    - cron: '17 23 * * *'

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    concurrency:
      group: binhamid-database-backup
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
      - name: Install PostgreSQL tools
        run: sudo apt-get update -qq && sudo apt-get install -y postgresql-client
      - name: Validate encrypted backup secrets
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          BACKUP_ENCRYPTION_KEY: ${{ secrets.BACKUP_ENCRYPTION_KEY }}
        run: |
          test -n "$SUPABASE_DB_URL"
          test -n "$BACKUP_ENCRYPTION_KEY"
      - name: Create and upload backup
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_STORAGE_BUCKET: ${{ vars.SUPABASE_STORAGE_BUCKET || 'factory-documents' }}
          BACKUP_ENCRYPTION_KEY: ${{ secrets.BACKUP_ENCRYPTION_KEY }}
          BACKUP_RETENTION_DAYS: '30'
          BACKUP_STORAGE_PREFIX: backups
          BACKUP_ENVIRONMENT: production
          BACKUP_OUTPUT_DIR: backup-output
        run: node scripts/backup-supabase.mjs | tee backup-result.jsonl
      - name: Upload encrypted recovery artifact
        uses: actions/upload-artifact@v4
        with:
          name: encrypted-database-backup-${{ github.run_id }}
          path: |
            backup-output/*.enc
            backup-output/*.manifest.json
            backup-result.jsonl
          if-no-files-found: error
          retention-days: 7
