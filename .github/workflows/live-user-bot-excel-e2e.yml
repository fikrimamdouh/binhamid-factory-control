name: Live User Bot Excel E2E

on:
  push:
    branches:
      - test/live-user-bot-excel-e2e

permissions:
  contents: read
  statuses: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      APP_URL: https://binhamid-factory-control.vercel.app
      TEST_EXTERNAL_ID: '9900000001'
      TEST_EMPLOYEE_ID: TEST-E2E-001
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      SUPABASE_POOLER_HOST: ${{ vars.SUPABASE_POOLER_HOST }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
      - name: Install project dependencies
        run: npm install --ignore-scripts --no-audit --no-fund
      - name: Run repository tests
        run: npm test
      - name: Verify live website and runtime version
        run: |
          set -euo pipefail
          node <<'NODE'
          const base=process.env.APP_URL;
          const root=await fetch(`${base}/`,{headers:{'cache-control':'no-cache'}});
          const html=await root.text();
          if(!root.ok)throw new Error(`Root HTTP ${root.status}`);
          if(!/legacy\.html/.test(html))throw new Error('Operational iframe is missing from live root');
          const legacy=await fetch(`${base}/legacy.html?e2e=${Date.now()}`,{headers:{'cache-control':'no-cache'}});
          if(!legacy.ok)throw new Error(`Legacy HTTP ${legacy.status}`);
          const statusResponse=await fetch(`${base}/api/system/status`,{headers:{'cache-control':'no-cache'}});
          const status=await statusResponse.json();
          if(!statusResponse.ok||!status.ok)throw new Error(`Status HTTP ${statusResponse.status}`);
          if(Number(status.directOperationsSchema)!==24)throw new Error(`Live schema is ${status.directOperationsSchema}, expected 24`);
          if(Number(status.webhookVersion)!==3)throw new Error(`Webhook version is ${status.webhookVersion}, expected 3`);
          console.log(JSON.stringify({root:true,legacy:true,version:status.version,schema:status.directOperationsSchema,webhookVersion:status.webhookVersion,telegramConfigured:status.telegramConfigured,conversationHistory:status.conversationHistory,dailyReportImport:status.dailyReportImport},null,2));
          NODE
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client
      - name: Resolve database endpoint
        run: |
          set -euo pipefail
          node <<'NODE'
          const {appendFileSync}=require('node:fs');
          const {spawnSync}=require('node:child_process');
          const raw=String(process.env.SUPABASE_DB_URL||'').trim();
          if(!raw)throw new Error('SUPABASE_DB_URL secret is missing');
          const configured=new URL(raw);
          const test=url=>{
            const target=new URL(url);
            target.searchParams.set('sslmode','require');
            target.searchParams.set('connect_timeout','5');
            const result=spawnSync('psql',[target.toString(),'-X','-t','-A','-v','ON_ERROR_STOP=1','-c','select 1;'],{encoding:'utf8',timeout:10000,stdio:['ignore','pipe','pipe']});
            return !result.error&&result.status===0&&String(result.stdout||'').trim()==='1'?target.toString():'';
          };
          let effective=test(configured.toString()),resolution='configured-endpoint';
          if(!effective){
            const match=configured.hostname.match(/^db\.([a-z0-9]+)\.supabase\.co$/i);
            if(!match)throw new Error('Configured database endpoint is unreachable and is not a derivable Supabase Direct URL');
            const projectRef=match[1],password=decodeURIComponent(configured.password);
            const regions=['eu-central-1','ap-southeast-1','us-east-1','eu-west-1','ap-south-1','us-west-1','us-west-2','us-east-2','ca-central-1','eu-west-2','eu-west-3','eu-central-2','eu-north-1','ap-northeast-1','ap-northeast-2','ap-southeast-2','sa-east-1'];
            const hosts=[String(process.env.SUPABASE_POOLER_HOST||'').trim(),...regions.flatMap(region=>[`aws-0-${region}.pooler.supabase.com`,`aws-1-${region}.pooler.supabase.com`])].filter(Boolean);
            for(const host of [...new Set(hosts)]){
              const candidate=new URL(configured.toString());
              candidate.protocol='postgresql:';
              candidate.username=`postgres.${projectRef}`;
              candidate.password=password;
              candidate.hostname=host;
              candidate.port='5432';
              effective=test(candidate.toString());
              if(effective){resolution='discovered-session-pooler';break;}
            }
          }
          if(!effective)throw new Error('No authenticated Supabase Session pooler endpoint was found');
          process.stdout.write(`::add-mask::${effective}\n`);
          appendFileSync(process.env.GITHUB_ENV,`SUPABASE_DB_URL=${effective}\n`,{mode:0o600});
          console.log(`[database-endpoint] ${resolution}`);
          NODE
      - name: Verify database connection
        run: |
          set -euo pipefail
          psql "$SUPABASE_DB_URL" -X -v ON_ERROR_STOP=1 -Atc "select 'database-connected'"
      - name: Inspect approval function signature
        run: |
          set -euo pipefail
          psql "$SUPABASE_DB_URL" -X -v ON_ERROR_STOP=1 -Atc "select pg_get_function_identity_arguments(p.oid) from pg_proc p join pg_namespace n on n.oid=p.pronamespace where n.nspname='public' and p.proname='approve_telegram_user' order by 1"
      - name: Create isolated test user
        run: |
          set -euo pipefail
          psql "$SUPABASE_DB_URL" -X -v ON_ERROR_STOP=1 -v test_external_id="$TEST_EXTERNAL_ID" -v test_employee_id="$TEST_EMPLOYEE_ID" <<'SQL'
          select approve_telegram_user(
            :'test_external_id',
            'مستخدم اختبار النظام',
            'manager',
            true,
            :'test_employee_id'
          );
          SQL
      - name: Verify isolated test user
        run: |
          set -euo pipefail
          count="$(psql "$SUPABASE_DB_URL" -X -v ON_ERROR_STOP=1 -Atc "select count(*) from app_users where external_id='${TEST_EXTERNAL_ID}' and active=true and role='manager'")"
          test "$count" = "1"
      - name: Insert isolated incoming bot record
        run: |
          set -euo pipefail
          psql "$SUPABASE_DB_URL" -X -v ON_ERROR_STOP=1 -v test_external_id="$TEST_EXTERNAL_ID" <<'SQL'
          insert into telegram_messages(
            update_id,chat_id,message_id,sender_user_id,sender_external_id,sender_name,
            chat_type,message_type,text,direction,delivery_status,action_name,action_payload,raw,created_at
          )
          select
            'e2e-user-message-v1', :'test_external_id', 'e2e-user-message-v1', u.id,
            :'test_external_id', 'مستخدم اختبار النظام', 'private', 'text',
            'اختبار آلي لسجل رسائل البوت', 'incoming', 'received', 'e2e_test_message',
            jsonb_build_object('source','github-actions','safe',true), jsonb_build_object('test',true), now()
          from app_users u
          where u.external_id=:'test_external_id'
          on conflict (chat_id,message_id) do update set
            sender_user_id=excluded.sender_user_id,
            sender_name=excluded.sender_name,
            direction=excluded.direction,
            delivery_status=excluded.delivery_status,
            action_name=excluded.action_name,
            action_payload=excluded.action_payload,
            raw=excluded.raw,
            created_at=excluded.created_at;
          SQL
      - name: Verify bot activity and collect Excel evidence
        run: |
          set -euo pipefail
          count="$(psql "$SUPABASE_DB_URL" -X -v ON_ERROR_STOP=1 -Atc "select count(*) from telegram_messages where sender_external_id='${TEST_EXTERNAL_ID}' and direction='incoming' and action_name='e2e_test_message'")"
          test "$count" = "1"
          psql "$SUPABASE_DB_URL" -X -v ON_ERROR_STOP=1 <<'SQL'
          select json_build_object(
            'real_bot_messages_30d',(select count(*) from telegram_messages where created_at>=now()-interval '30 days'),
            'real_incoming_30d',(select count(*) from telegram_messages where created_at>=now()-interval '30 days' and coalesce(direction,'incoming')<>'outgoing'),
            'real_outgoing_30d',(select count(*) from telegram_messages where created_at>=now()-interval '30 days' and direction='outgoing'),
            'active_telegram_users',(select count(*) from app_users where active=true and external_id is not null),
            'excel_imports_30d',(select count(*) from imports where created_at>=now()-interval '30 days' and lower(coalesce(original_name,'')) ~ '\.(xlsx|xls)$'),
            'excel_failed_30d',(select count(*) from imports where created_at>=now()-interval '30 days' and lower(coalesce(original_name,'')) ~ '\.(xlsx|xls)$' and status='failed'),
            'excel_ready_or_posted_30d',(select count(*) from imports where created_at>=now()-interval '30 days' and lower(coalesce(original_name,'')) ~ '\.(xlsx|xls)$' and status in ('ready','ready_for_review','approved','posted','completed'))
          ) as sanitized_evidence;
          select coalesce(last_error_code,'NONE') as error_code,count(*) as occurrences
          from imports
          where created_at>=now()-interval '30 days'
            and lower(coalesce(original_name,'')) ~ '\.(xlsx|xls)$'
          group by coalesce(last_error_code,'NONE')
          order by occurrences desc,error_code
          limit 10;
          SQL
      - name: Publish verification status
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          HEAD_SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          JOB_STATUS: ${{ job.status }}
        run: |
          node <<'NODE'
          const success=process.env.JOB_STATUS==='success';
          const response=await fetch(`https://api.github.com/repos/${process.env.REPOSITORY}/statuses/${process.env.HEAD_SHA}`,{
            method:'POST',headers:{Accept:'application/vnd.github+json',Authorization:`Bearer ${process.env.GITHUB_TOKEN}`,'X-GitHub-Api-Version':'2022-11-28','Content-Type':'application/json'},
            body:JSON.stringify({state:success?'success':'failure',context:'live-user-bot-excel-e2e',target_url:process.env.RUN_URL,description:success?'Live site, test user, bot log, and Excel evidence passed.':'Live user, bot log, or Excel verification failed.'})
          });
          if(!response.ok)throw new Error(`Status publication failed with HTTP ${response.status}`);
          NODE
