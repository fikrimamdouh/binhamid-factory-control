name: Live User Bot Excel E2E V2

on:
  push:
    branches:
      - test/live-user-bot-excel-e2e-v2

permissions:
  contents: read
  statuses: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      APP_URL: https://binhamid-factory-control.vercel.app
      TEST_EXTERNAL_ID: '9900000001'
      TEST_EMPLOYEE_ID: TEST-E2E-001
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      SUPABASE_POOLER_HOST: ${{ vars.SUPABASE_POOLER_HOST }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
      - name: Install dependencies and run tests
        run: |
          npm install --ignore-scripts --no-audit --no-fund
          npm test
      - name: Verify live application
        run: |
          set -euo pipefail
          node <<'NODE'
          const base=process.env.APP_URL;
          for(const path of ['/',`/legacy.html?e2e=${Date.now()}`]){
            const response=await fetch(base+path,{headers:{'cache-control':'no-cache'}});
            if(!response.ok)throw new Error(`${path} HTTP ${response.status}`);
          }
          const response=await fetch(`${base}/api/system/status`,{headers:{'cache-control':'no-cache'}});
          const status=await response.json();
          if(!response.ok||!status.ok||Number(status.directOperationsSchema)!==24||Number(status.webhookVersion)!==3)throw new Error('Live runtime is not schema 24 / webhook 3');
          console.log(`[live] ${status.version}; schema=${status.directOperationsSchema}; webhook=${status.webhookVersion}`);
          NODE
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client
      - name: Resolve authenticated database endpoint
        run: |
          set -euo pipefail
          node <<'NODE'
          const {appendFileSync}=require('node:fs');
          const {spawnSync}=require('node:child_process');
          const raw=String(process.env.SUPABASE_DB_URL||'').trim();
          if(!raw)throw new Error('SUPABASE_DB_URL is missing');
          const configured=new URL(raw);
          const probe=value=>{
            const target=new URL(value);
            target.searchParams.set('sslmode','require');
            target.searchParams.set('connect_timeout','5');
            const result=spawnSync('psql',[target.toString(),'-X','-t','-A','-v','ON_ERROR_STOP=1','-c','select 1;'],{encoding:'utf8',timeout:10000,stdio:['ignore','pipe','pipe']});
            return !result.error&&result.status===0&&String(result.stdout||'').trim()==='1'?target.toString():'';
          };
          let effective=probe(configured.toString());
          if(!effective){
            const match=configured.hostname.match(/^db\.([a-z0-9]+)\.supabase\.co$/i);
            if(!match)throw new Error('Database endpoint cannot be derived');
            const projectRef=match[1],password=decodeURIComponent(configured.password);
            const regions=['eu-central-1','ap-southeast-1','us-east-1','eu-west-1','ap-south-1','us-west-1','us-west-2','us-east-2','ca-central-1','eu-west-2','eu-west-3','eu-central-2','eu-north-1','ap-northeast-1','ap-northeast-2','ap-southeast-2','sa-east-1'];
            const hosts=[String(process.env.SUPABASE_POOLER_HOST||'').trim(),...regions.flatMap(region=>[`aws-0-${region}.pooler.supabase.com`,`aws-1-${region}.pooler.supabase.com`])].filter(Boolean);
            for(const host of [...new Set(hosts)]){
              const candidate=new URL(configured.toString());
              candidate.protocol='postgresql:';
              candidate.username=`postgres.${projectRef}`;
              candidate.password=password;
              candidate.hostname=host;
              candidate.port='5432';
              effective=probe(candidate.toString());
              if(effective)break;
            }
          }
          if(!effective)throw new Error('Authenticated Session pooler not found');
          process.stdout.write(`::add-mask::${effective}\n`);
          appendFileSync(process.env.GITHUB_ENV,`SUPABASE_DB_URL=${effective}\n`,{mode:0o600});
          NODE
      - name: Create and verify isolated test user through Telegram channel
        run: |
          set -euo pipefail
          psql "$SUPABASE_DB_URL" -X -v ON_ERROR_STOP=1 -v test_external_id="$TEST_EXTERNAL_ID" -v test_employee_id="$TEST_EMPLOYEE_ID" <<'SQL'
          select approve_telegram_user(:'test_external_id','مستخدم اختبار النظام','manager',true,:'test_employee_id');
          SQL
          count="$(psql "$SUPABASE_DB_URL" -X -v ON_ERROR_STOP=1 -Atc "select count(*) from user_channels c join app_users u on u.id=c.user_id where c.channel='telegram' and c.external_id='${TEST_EXTERNAL_ID}' and c.active=true and u.active=true and u.role='manager'")"
          test "$count" = "1"
      - name: Insert and verify isolated incoming bot message
        run: |
          set -euo pipefail
          psql "$SUPABASE_DB_URL" -X -v ON_ERROR_STOP=1 -v test_external_id="$TEST_EXTERNAL_ID" <<'SQL'
          insert into telegram_messages(
            update_id,chat_id,message_id,sender_user_id,sender_external_id,sender_name,
            chat_type,message_type,text,direction,delivery_status,action_name,action_payload,raw,created_at
          )
          select
            'e2e-user-message-v2', :'test_external_id', 'e2e-user-message-v2', u.id,
            :'test_external_id', 'مستخدم اختبار النظام', 'private', 'text',
            'اختبار آلي لسجل رسائل البوت', 'incoming', 'received', 'e2e_test_message',
            jsonb_build_object('source','github-actions','safe',true), jsonb_build_object('test',true), now()
          from user_channels c join app_users u on u.id=c.user_id
          where c.channel='telegram' and c.external_id=:'test_external_id'
          on conflict (chat_id,message_id) do update set
            sender_user_id=excluded.sender_user_id,
            sender_name=excluded.sender_name,
            direction=excluded.direction,
            delivery_status=excluded.delivery_status,
            action_name=excluded.action_name,
            action_payload=excluded.action_payload,
            raw=excluded.raw,
            created_at=excluded.created_at;
          SQL
          count="$(psql "$SUPABASE_DB_URL" -X -v ON_ERROR_STOP=1 -Atc "select count(*) from telegram_messages where chat_id='${TEST_EXTERNAL_ID}' and message_id='e2e-user-message-v2' and direction='incoming'")"
          test "$count" = "1"
      - name: Collect sanitized bot and Excel evidence
        id: evidence
        run: |
          set -euo pipefail
          evidence="$(psql "$SUPABASE_DB_URL" -X -v ON_ERROR_STOP=1 -At -F, -c "select (select count(*) from telegram_messages where created_at>=now()-interval '30 days'),(select count(*) from telegram_messages where created_at>=now()-interval '30 days' and coalesce(direction,'incoming')<>'outgoing'),(select count(*) from telegram_messages where created_at>=now()-interval '30 days' and direction='outgoing'),(select count(distinct user_id) from user_channels where channel='telegram' and active=true),(select count(*) from imports where created_at>=now()-interval '30 days' and lower(coalesce(original_name,'')) ~ '\\.(xlsx|xls)$'),(select count(*) from imports where created_at>=now()-interval '30 days' and lower(coalesce(original_name,'')) ~ '\\.(xlsx|xls)$' and status='failed'),(select count(*) from imports where created_at>=now()-interval '30 days' and lower(coalesce(original_name,'')) ~ '\\.(xlsx|xls)$' and status in ('ready','ready_for_review','approved','posted','completed'))")"
          IFS=',' read -r total incoming outgoing users excel failed ready <<< "$evidence"
          top_error="$(psql "$SUPABASE_DB_URL" -X -v ON_ERROR_STOP=1 -At -F: -c "select coalesce(last_error_code,'NONE'),count(*) from imports where created_at>=now()-interval '30 days' and lower(coalesce(original_name,'')) ~ '\\.(xlsx|xls)$' group by coalesce(last_error_code,'NONE') order by count(*) desc,1 limit 1")"
          echo "context=evidence:b${total}-i${incoming}-o${outgoing}-u${users}-x${excel}-f${failed}-r${ready}" >> "$GITHUB_OUTPUT"
          safe_error="$(printf '%s' "${top_error:-NONE:0}" | tr -cd 'A-Za-z0-9_:-' | cut -c1-70)"
          echo "error_context=excel-error:${safe_error}" >> "$GITHUB_OUTPUT"
          echo "[sanitized-evidence] total=$total incoming=$incoming outgoing=$outgoing users=$users excel=$excel failed=$failed ready=$ready top_error=${safe_error}"
      - name: Publish evidence statuses
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          HEAD_SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          EVIDENCE_CONTEXT: ${{ steps.evidence.outputs.context }}
          ERROR_CONTEXT: ${{ steps.evidence.outputs.error_context }}
        run: |
          node <<'NODE'
          for(const context of [process.env.EVIDENCE_CONTEXT,process.env.ERROR_CONTEXT]){
            const response=await fetch(`https://api.github.com/repos/${process.env.REPOSITORY}/statuses/${process.env.HEAD_SHA}`,{
              method:'POST',headers:{Accept:'application/vnd.github+json',Authorization:`Bearer ${process.env.GITHUB_TOKEN}`,'X-GitHub-Api-Version':'2022-11-28','Content-Type':'application/json'},
              body:JSON.stringify({state:'success',context,target_url:process.env.RUN_URL,description:'Sanitized production evidence; no message text or secret values exposed.'})
            });
            if(!response.ok)throw new Error(`Status publication failed: ${response.status}`);
          }
          NODE
      - name: Publish verification status
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          HEAD_SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          JOB_STATUS: ${{ job.status }}
        run: |
          node <<'NODE'
          const success=process.env.JOB_STATUS==='success';
          const response=await fetch(`https://api.github.com/repos/${process.env.REPOSITORY}/statuses/${process.env.HEAD_SHA}`,{
            method:'POST',headers:{Accept:'application/vnd.github+json',Authorization:`Bearer ${process.env.GITHUB_TOKEN}`,'X-GitHub-Api-Version':'2022-11-28','Content-Type':'application/json'},
            body:JSON.stringify({state:success?'success':'failure',context:'live-user-bot-excel-e2e-v2',target_url:process.env.RUN_URL,description:success?'Live user, bot message, and Excel evidence passed.':'Live user, bot message, or Excel evidence failed.'})
          });
          if(!response.ok)throw new Error(`Status publication failed with HTTP ${response.status}`);
          NODE
