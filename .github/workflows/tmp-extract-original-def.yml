name: Extract Pre-change Declaration Defaults
on:
  push:
    branches:
      - fix/restore-original-declaration-texts
    paths:
      - '.github/workflows/tmp-extract-original-def.yml'
permissions:
  contents: write
jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/restore-original-declaration-texts
          fetch-depth: 0
      - name: Extract defaults from pre-change commit
        run: |
          git show aa1891988403055fcd8829fd8e6d64c64466d0b0:legacy.html > /tmp/legacy-original.html
          python - <<'PY'
          from pathlib import Path
          src=Path('/tmp/legacy-original.html').read_text(encoding='utf-8').splitlines()
          start=next(i for i,line in enumerate(src) if 'const DEF = {' in line)
          end=next(i for i in range(start,len(src)) if src[i].strip()=='};')
          Path('debug').mkdir(exist_ok=True)
          Path('debug/declaration-defaults-aa189.txt').write_text('\n'.join(src[start:end+1]),encoding='utf-8')
          print(start+1,end+1)
          PY
      - name: Commit result
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add debug/declaration-defaults-aa189.txt
          git diff --cached --quiet && exit 0
          git commit -m 'chore: extract pre-change declaration defaults'
          git push origin HEAD:fix/restore-original-declaration-texts
