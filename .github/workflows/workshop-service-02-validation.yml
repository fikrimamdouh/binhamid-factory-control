name: Workshop Service 02 Validation

on:
  workflow_dispatch:
  push:
    branches:
      - agent/workshop-service-02
    paths:
      - '.github/workflows/workshop-service-02-validation.yml'
      - 'supabase/migrations/025_workshop_central_data_model.sql'
      - 'supabase/migrations/026_workshop_service_rpcs.sql'
      - 'supabase/migrations/027_workshop_service_compatibility.sql'
      - 'api/_lib/workshop-service.js'
      - 'api/_lib/workshop-state-machine.js'
      - 'api/_lib/routes/workshop.js'
      - 'tests/workshop-service.test.mjs'
      - 'tests/workshop-state-machine.test.mjs'
  pull_request:
    branches:
      - agent/workshop-data-model-025
    paths:
      - '.github/workflows/workshop-service-02-validation.yml'
      - 'supabase/migrations/026_workshop_service_rpcs.sql'
      - 'supabase/migrations/027_workshop_service_compatibility.sql'
      - 'api/_lib/workshop-service.js'
      - 'api/_lib/workshop-state-machine.js'
      - 'api/_lib/routes/workshop.js'
      - 'tests/workshop-service.test.mjs'
      - 'tests/workshop-state-machine.test.mjs'

permissions:
  contents: read
  statuses: write

concurrency:
  group: binhamid-workshop-service-02-validation
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: workshop_service
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d workshop_service"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/workshop_service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Validate repository contracts
        run: |
          set -euo pipefail
          npm install --ignore-scripts --no-audit --no-fund
          node --check api/_lib/workshop-service.js
          node --check api/_lib/workshop-state-machine.js
          node --check api/_lib/routes/workshop.js
          npm run audit:migrations
          npm test
          npm run check:api
          npm run check:functions

      - name: Install PostgreSQL client
        run: sudo apt-get update -qq && sudo apt-get install -y postgresql-client

      - name: Create schema 24 workshop fixture and Supabase roles
        shell: bash
        run: |
          set -euo pipefail
          psql "$TEST_DATABASE_URL" -X -v ON_ERROR_STOP=1 <<'SQL'
          create extension if not exists pgcrypto;
          do $$ begin create role anon nologin; exception when duplicate_object then null; end $$;
          do $$ begin create role authenticated nologin; exception when duplicate_object then null; end $$;
          do $$ begin create role service_role nologin; exception when duplicate_object then null; end $$;

          create table public.migration_history(version integer primary key,migration_name text not null,applied_at timestamptz not null default now());
          insert into public.migration_history(version,migration_name) select value,concat('fixture_',lpad(value::text,3,'0')) from generate_series(1,24) value;

          create table public.unified_assets(
            id uuid primary key default gen_random_uuid(),external_id text not null unique,
            asset_type text not null default 'vehicle',asset_name text,plate_no text,asset_no text,serial_no text,
            make text,model text,operational_status text not null default 'in_service',diesel_expected boolean,
            assigned_employee_external_id text,cost_center_code text,active boolean not null default true,
            source_updated_at timestamptz,metadata jsonb not null default '{}'::jsonb,
            created_at timestamptz not null default now(),updated_at timestamptz not null default now()
          );

          create table public.maintenance_orders(
            id uuid primary key default gen_random_uuid(),reference_no text not null unique,vehicle_external_id text,
            plate_snapshot text,problem text,diagnosis text,priority text not null default 'normal',vehicle_stopped boolean not null default false,
            status text not null default 'draft' check(status in ('draft','reported','inspection','quotation_required','approval_pending','approved','in_repair','testing','completed','cancelled')),
            reported_by uuid,confirmed_by uuid,approved_by uuid,source_channel text,source_chat_id text,source_message_id text,voice_path text,
            estimated_cost numeric(18,2),actual_cost numeric(18,2),reported_at timestamptz,confirmed_at timestamptz,approved_at timestamptz,
            closed_at timestamptz,cancelled_at timestamptz,cancelled_by uuid,created_at timestamptz not null default now(),updated_at timestamptz not null default now()
          );
          create table public.maintenance_updates(
            id uuid primary key default gen_random_uuid(),maintenance_id uuid not null references public.maintenance_orders(id) on delete restrict,
            status text not null,note text,created_by uuid,source_channel text,source_chat_id text,source_message_id text,created_at timestamptz not null default now()
          );
          create table public.operational_records(
            id uuid primary key default gen_random_uuid(),reference_no text not null unique,entity_type text not null,department text not null,status text not null,
            title text,summary text,amount numeric(18,2) not null default 0,payload jsonb not null default '{}'::jsonb,created_by text,assigned_to text,
            source_channel text,source_chat_id text,source_message_id text,created_at timestamptz not null default now(),updated_at timestamptz not null default now(),closed_at timestamptz
          );
          create table public.audit_log(
            id uuid primary key default gen_random_uuid(),actor_type text,actor_id text,action text not null,entity_type text,entity_id text,
            details jsonb not null default '{}'::jsonb,created_at timestamptz not null default now()
          );
          create table public.role_capabilities(
            role text not null,capability text not null,allowed boolean not null default true,created_at timestamptz not null default now(),primary key(role,capability)
          );
          insert into public.unified_assets(external_id,asset_type,asset_name,plate_no,operational_status,active)
          values('ASSET-TEST-1','vehicle','شاحنة اختبار','TEST-100','in_service',true);
          SQL

      - name: Apply workshop schemas 25 through 27 atomically
        shell: bash
        run: |
          set -euo pipefail
          cat supabase/migrations/025_workshop_central_data_model.sql supabase/migrations/026_workshop_service_rpcs.sql supabase/migrations/027_workshop_service_compatibility.sql > workshop-service-schema.sql
          psql "$TEST_DATABASE_URL" -X -v ON_ERROR_STOP=1 --single-transaction --file workshop-service-schema.sql

      - name: Execute complete atomic workshop lifecycle
        shell: bash
        run: |
          set -euo pipefail
          psql "$TEST_DATABASE_URL" -X -v ON_ERROR_STOP=1 <<'SQL'
          select public.workshop_create_order(
            'BH-RO-2026-99001','ASSET-TEST-1','عطل اختبار دورة الخدمة','urgent',true,'engine',
            '11111111-1111-4111-8111-111111111111','mechanic','telegram','100','200','cmd-create-1','{}'::jsonb
          );
          select public.workshop_create_order(
            'BH-RO-2026-99001','ASSET-TEST-1','عطل اختبار دورة الخدمة','urgent',true,'engine',
            '11111111-1111-4111-8111-111111111111','mechanic','telegram','100','200','cmd-create-1','{}'::jsonb
          );

          select public.workshop_assign_technician(
            (select id from public.maintenance_orders where reference_no='BH-RO-2026-99001'),
            'TECH-1','22222222-2222-4222-8222-222222222222','manager','cmd-assign-1',1
          );
          select public.workshop_transition_order((select id from public.maintenance_orders where reference_no='BH-RO-2026-99001'),'reported','11111111-1111-4111-8111-111111111111','mechanic','telegram','تأكيد البلاغ','confirmed','cmd-reported-1',2,'{}');
          select public.workshop_transition_order((select id from public.maintenance_orders where reference_no='BH-RO-2026-99001'),'inspection','11111111-1111-4111-8111-111111111111','mechanic','telegram','بدء الفحص','inspection','cmd-inspection-1',3,'{}');

          insert into public.maintenance_diagnostics(maintenance_id,technician_external_id,diagnosis,root_cause,proposed_action,risk_level,source_channel,created_by,request_id)
          select id,'TECH-1','تلف في جزء الاختبار','استهلاك','استبدال الجزء','normal','web','TECH-1','diag-1'
          from public.maintenance_orders where reference_no='BH-RO-2026-99001';

          select public.workshop_transition_order((select id from public.maintenance_orders where reference_no='BH-RO-2026-99001'),'diagnosed','11111111-1111-4111-8111-111111111111','mechanic','web','تم التشخيص','diagnosis','cmd-diagnosed-1',4,'{}');
          select public.workshop_transition_order((select id from public.maintenance_orders where reference_no='BH-RO-2026-99001'),'in_repair','11111111-1111-4111-8111-111111111111','mechanic','web','بدء الإصلاح','repair','cmd-repair-1',5,'{}');

          insert into public.maintenance_labor_entries(maintenance_id,technician_external_id,work_type,started_at,ended_at,hours,cost_per_hour,source_channel,created_by,request_id)
          select id,'TECH-1','إصلاح تجريبي',now()-interval '2 hours',now(),2,50,'web','TECH-1','labor-1'
          from public.maintenance_orders where reference_no='BH-RO-2026-99001';

          select public.workshop_transition_order((select id from public.maintenance_orders where reference_no='BH-RO-2026-99001'),'testing','11111111-1111-4111-8111-111111111111','mechanic','web','بدء الاختبار','testing','cmd-testing-1',6,jsonb_build_object('resolutionSummary','تم الإصلاح'));
          select public.workshop_transition_order((select id from public.maintenance_orders where reference_no='BH-RO-2026-99001'),'ready_for_handover','11111111-1111-4111-8111-111111111111','mechanic','web','الاختبار ناجح','test','cmd-ready-1',7,jsonb_build_object('testPassed',true,'testResult','passed'));
          select public.workshop_transition_order((select id from public.maintenance_orders where reference_no='BH-RO-2026-99001'),'completed','22222222-2222-4222-8222-222222222222','manager','web','جاهز للاستلام','complete','cmd-completed-1',8,'{}');
          select public.workshop_transition_order((select id from public.maintenance_orders where reference_no='BH-RO-2026-99001'),'closed','22222222-2222-4222-8222-222222222222','manager','web','تم الاستلام','handover','cmd-closed-1',9,jsonb_build_object('handoverStatus','accepted'));
          SQL

      - name: Assert service invariants
        shell: bash
        run: |
          set -euo pipefail
          test "$(psql "$TEST_DATABASE_URL" -X -t -A -c "select count(*) from public.maintenance_orders where reference_no='BH-RO-2026-99001'")" -eq 1
          test "$(psql "$TEST_DATABASE_URL" -X -t -A -c "select status from public.maintenance_orders where reference_no='BH-RO-2026-99001'")" = closed
          test "$(psql "$TEST_DATABASE_URL" -X -t -A -c "select handover_status from public.maintenance_orders where reference_no='BH-RO-2026-99001'")" = accepted
          test "$(psql "$TEST_DATABASE_URL" -X -t -A -c "select test_passed from public.maintenance_orders where reference_no='BH-RO-2026-99001'")" = t
          test "$(psql "$TEST_DATABASE_URL" -X -t -A -c "select count(*) from public.operational_records where reference_no='BH-RO-2026-99001' and status='closed' and maintenance_order_id is not null")" -eq 1
          test "$(psql "$TEST_DATABASE_URL" -X -t -A -c "select count(*) from public.workshop_command_receipts where maintenance_id=(select id from public.maintenance_orders where reference_no='BH-RO-2026-99001')")" -eq 10
          test "$(psql "$TEST_DATABASE_URL" -X -t -A -c "select count(*) from public.maintenance_status_history where maintenance_id=(select id from public.maintenance_orders where reference_no='BH-RO-2026-99001')")" -eq 9
          test "$(psql "$TEST_DATABASE_URL" -X -t -A -c 'select max(version) from public.migration_history')" -eq 27

      - name: Export service evidence
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          psql "$TEST_DATABASE_URL" -X -t -A -c "select jsonb_pretty(jsonb_build_object('schemaVersion',(select max(version) from public.migration_history),'orders',(select count(*) from public.maintenance_orders),'status',(select status from public.maintenance_orders where reference_no='BH-RO-2026-99001'),'operationalStatus',(select status from public.operational_records where reference_no='BH-RO-2026-99001'),'receipts',(select count(*) from public.workshop_command_receipts),'history',(select count(*) from public.maintenance_status_history)))" > workshop-service-validation.json || true

      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workshop-service-02-validation-${{ github.run_id }}
          path: workshop-service-validation.json
          if-no-files-found: warn
          retention-days: 30

      - name: Publish validation status
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          HEAD_SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          JOB_STATUS: ${{ job.status }}
        run: |
          node <<'NODE'
          const success=process.env.JOB_STATUS==='success';
          const response=await fetch(`https://api.github.com/repos/${process.env.REPOSITORY}/statuses/${process.env.HEAD_SHA}`,{
            method:'POST',headers:{Accept:'application/vnd.github+json',Authorization:`Bearer ${process.env.GITHUB_TOKEN}`,'X-GitHub-Api-Version':'2022-11-28','Content-Type':'application/json'},
            body:JSON.stringify({state:success?'success':'failure',context:'workshop-service-02:isolated',target_url:process.env.RUN_URL,description:success?'Workshop service completed an idempotent create-to-close lifecycle.':'Workshop service validation failed; no external database was modified.'})
          });
          if(!response.ok)throw new Error(`Status publication failed with HTTP ${response.status}`);
          NODE
