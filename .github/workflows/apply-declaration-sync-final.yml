name: Apply Declaration Sync Final
on:
  push:
    branches:
      - fix/declaration-sync-final
permissions:
  contents: write
jobs:
  apply:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/declaration-sync-final
          fetch-depth: 0
      - name: Apply verified source changes
        run: |
          set -euo pipefail
          for patch in .final/*.diff; do
            git apply --check "$patch"
            git apply "$patch"
          done
          cat .final/declaration-workspace-fixes.part1 .final/declaration-workspace-fixes.part2 > assets/declaration-workspace-fixes.js
          cp .final/declaration-sync-predeploy-fixes.test.mjs tests/declaration-sync-predeploy-fixes.test.mjs
          rm -rf .final
          rm -f .github/workflows/apply-declaration-sync-final.yml
      - name: Validate changed JavaScript
        run: |
          node --check assets/declaration-workspace-fixes.js
          node --check assets/sync-integrity-guard.js
          node --check assets/cloud-control.js
          node --check assets/login-sync.js
          node --check assets/telegram-pdf-declarations.js
          node --check assets/master-data-unified-operations.js
          node --check assets/employee-declaration-sync.js
          node --check api/_lib/routes/canonical-master-data.js
          node --check api/_lib/routes/reports-telegram.js
          git diff --check
      - name: Run focused regression tests
        run: |
          node --test \
            tests/declaration-sync-predeploy-fixes.test.mjs \
            tests/boot-critical-load.test.mjs \
            tests/canonical-identity-registry.test.mjs \
            tests/linked-employee-declaration-sync.test.mjs \
            tests/master-data-single-workspace.test.mjs \
            tests/print-capture-and-conflict-recovery.test.mjs \
            tests/print-registry-sync-integrity.test.mjs \
            tests/repair-plan-acceptance.test.mjs
      - name: Commit final implementation
        run: |
          git config user.name 'binhamid-final-fix-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git commit -m 'fix: finalize declarations employee sync and Telegram delivery'
          git push origin HEAD:fix/declaration-sync-final
