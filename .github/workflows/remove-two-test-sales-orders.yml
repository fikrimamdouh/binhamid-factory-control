name: Remove Two Test Sales Orders

on:
  push:
    branches:
      - ops/remove-two-test-sales-orders

permissions:
  contents: read
  statuses: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      SUPABASE_POOLER_HOST: ${{ vars.SUPABASE_POOLER_HOST }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
      - name: Install PostgreSQL client
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client
      - name: Resolve protected database connection
        env:
          CONNECTION_DIAGNOSTIC_PATH: cleanup-connection-diagnostic.json
        run: node scripts/resolve-supabase-connection.mjs
      - name: Remove guarded test orders
        run: node scripts/remove-two-test-sales-orders.mjs
      - name: Upload cleanup evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-sales-order-cleanup-${{ github.run_id }}
          path: |
            test-sales-order-cleanup.json
            cleanup-connection-diagnostic.json
          if-no-files-found: warn
          retention-days: 14
      - name: Publish cleanup status
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          node <<'NODE'
          import { existsSync,readFileSync } from 'node:fs';
          const report=existsSync('test-sales-order-cleanup.json')?JSON.parse(readFileSync('test-sales-order-cleanup.json','utf8')):{ok:false,code:'CLEANUP_REPORT_MISSING'};
          const state=report.ok?'success':'failure',description=report.ok?'Two guarded test sales orders are absent from production.':`Cleanup blocked: ${report.code||'unknown'}`;
          const response=await fetch(`https://api.github.com/repos/${process.env.GITHUB_REPOSITORY}/statuses/${process.env.GITHUB_SHA}`,{method:'POST',headers:{Accept:'application/vnd.github+json',Authorization:`Bearer ${process.env.GITHUB_TOKEN}`,'X-GitHub-Api-Version':'2022-11-28','Content-Type':'application/json'},body:JSON.stringify({state,context:'test-sales-order-cleanup',description,target_url:`${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`})});
          if(!response.ok)throw new Error(`Status publication failed: ${response.status}`);
          NODE
