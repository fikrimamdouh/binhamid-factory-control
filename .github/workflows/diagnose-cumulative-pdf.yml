name: Diagnose Cumulative PDF

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
      - name: Install dependencies
        run: npm install --ignore-scripts --no-audit --no-fund
      - name: Enterprise checker
        run: node scripts/check-enterprise.mjs
      - name: Operational roadmap checker
        run: node scripts/check-operational-roadmap.mjs
      - name: Migration audit
        run: npm run audit:migrations
      - name: Legacy audit
        run: npm run audit:legacy
      - name: New cumulative PDF tests
        run: node --test tests/daily-cumulative-pdf-integrations.test.mjs
      - name: Existing tests one by one
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p diagnostic
          for file in $(find tests -maxdepth 1 -name '*.test.mjs' ! -name 'daily-cumulative-pdf-integrations.test.mjs' -print | sort); do
            echo "Running $file"
            if ! node --test "$file"; then
              printf '%s\n' "$file" > diagnostic/failing-test.txt
              exit 1
            fi
          done
      - name: Upload failing test name
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cumulative-pdf-diagnostic-${{ github.run_id }}
          path: diagnostic/failing-test.txt
          if-no-files-found: ignore
          retention-days: 1
      - name: API contract audit
        run: npm run check:api
      - name: Function count audit
        run: npm run check:functions
