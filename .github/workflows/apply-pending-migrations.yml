name: Apply Database Migrations 011-014

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/apply-pending-migrations.yml'
      - 'scripts/resolve-supabase-connection.mjs'
      - 'scripts/migration-preflight.mjs'
      - 'scripts/migration-verify.mjs'
      - 'scripts/verify-backup-files.mjs'
      - 'scripts/backup-supabase.mjs'
      - 'supabase/migrations/011_cost_centers_and_operational_resilience.sql'
      - 'supabase/migrations/012_daily_report_idempotency_and_validation.sql'
      - 'supabase/migrations/013_fifo_rebuild_and_cost_reversals.sql'
      - 'supabase/migrations/014_fifo_replay_and_maintenance_trigger_guard.sql'

permissions:
  contents: read
  statuses: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    concurrency:
      group: binhamid-production-database-migrations
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Validate repository and migrations
        run: |
          set -euo pipefail
          npm install --ignore-scripts --no-audit --no-fund
          node --check scripts/resolve-supabase-connection.mjs
          node --check scripts/migration-preflight.mjs
          node --check scripts/migration-verify.mjs
          node --check scripts/verify-backup-files.mjs
          npm run audit:migrations
          npm test

      - name: Install PostgreSQL 17 client
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y curl ca-certificates
          sudo install -d -m 0755 /usr/share/postgresql-common/pgdg
          sudo curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc
          . /etc/os-release
          printf '%s\n' \
            'Types: deb' \
            'URIs: https://apt.postgresql.org/pub/repos/apt' \
            "Suites: ${VERSION_CODENAME}-pgdg" \
            'Components: main' \
            'Signed-By: /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc' \
            | sudo tee /etc/apt/sources.list.d/pgdg.sources > /dev/null
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client-17
          test -x /usr/lib/postgresql/17/bin/pg_dump
          echo '/usr/lib/postgresql/17/bin' >> "$GITHUB_PATH"

      - name: Resolve protected database connection
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_POOLER_HOST: ${{ vars.SUPABASE_POOLER_HOST }}
          CONNECTION_DIAGNOSTIC_PATH: migration-connection-diagnostic.json
        run: node scripts/resolve-supabase-connection.mjs

      - name: Upload safe connection diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: migration-connection-diagnostic-${{ github.run_id }}
          path: migration-connection-diagnostic.json
          if-no-files-found: error
          retention-days: 7

      - name: Create encrypted pre-migration backup
        env:
          BACKUP_ENCRYPTION_KEY: ${{ secrets.BACKUP_ENCRYPTION_KEY }}
          BACKUP_ENVIRONMENT: production-pre-migration
          BACKUP_OUTPUT_DIR: pre-migration-backup
        shell: bash
        run: |
          set -euo pipefail
          rm -rf pre-migration-backup
          mkdir -p pre-migration-backup
          node scripts/backup-supabase.mjs | tee pre-migration-backup-result.jsonl
          BACKUP_RESULT_FILE=pre-migration-backup-result.jsonl \
          BACKUP_OUTPUT_DIR=pre-migration-backup \
          BACKUP_VERIFICATION_FILE=pre-migration-backup-verification.json \
          BACKUP_MANIFEST_ENV_NAME=PRE_MIGRATION_MANIFEST \
          node scripts/verify-backup-files.mjs

      - name: Upload encrypted pre-migration backup
        uses: actions/upload-artifact@v4
        with:
          name: encrypted-pre-migration-backup-${{ github.run_id }}
          path: |
            pre-migration-backup/*.enc
            pre-migration-backup/*.manifest.json
            pre-migration-backup-result.jsonl
            pre-migration-backup-verification.json
          if-no-files-found: error
          retention-days: 14

      - name: Run migration preflight
        env:
          MIGRATION_PREFLIGHT_PATH: migration-preflight.json
        run: node scripts/migration-preflight.mjs

      - name: Apply pending migrations atomically
        shell: bash
        run: |
          set -euo pipefail
          current_version="$(node -e "const x=require('./migration-preflight.json');process.stdout.write(String(x.currentVersion))")"
          if [ "$current_version" -ge 14 ]; then
            echo 'Database is already at schema version 14.'
            exit 0
          fi
          : > pending-migrations.sql
          for version in $(seq $((current_version + 1)) 14); do
            file="$(find supabase/migrations -maxdepth 1 -type f -name "$(printf '%03d' "$version")_*.sql" -print -quit)"
            test -n "$file"
            printf '\n-- BEGIN %s\n' "$file" >> pending-migrations.sql
            cat "$file" >> pending-migrations.sql
            printf '\n-- END %s\n' "$file" >> pending-migrations.sql
          done
          psql "$SUPABASE_DB_URL" -X -v ON_ERROR_STOP=1 --single-transaction --file pending-migrations.sql
          rm -f pending-migrations.sql

      - name: Verify schema and protected row counts
        env:
          MIGRATION_PREFLIGHT_PATH: migration-preflight.json
          MIGRATION_RESULT_PATH: migration-result.json
        run: node scripts/migration-verify.mjs

      - name: Create encrypted post-migration backup
        env:
          BACKUP_ENCRYPTION_KEY: ${{ secrets.BACKUP_ENCRYPTION_KEY }}
          BACKUP_ENVIRONMENT: production-post-migration
          BACKUP_OUTPUT_DIR: post-migration-backup
        shell: bash
        run: |
          set -euo pipefail
          rm -rf post-migration-backup
          mkdir -p post-migration-backup
          node scripts/backup-supabase.mjs | tee post-migration-backup-result.jsonl
          BACKUP_RESULT_FILE=post-migration-backup-result.jsonl \
          BACKUP_OUTPUT_DIR=post-migration-backup \
          BACKUP_VERIFICATION_FILE=post-migration-backup-verification.json \
          BACKUP_MANIFEST_ENV_NAME=POST_MIGRATION_MANIFEST \
          EXPECTED_SCHEMA_VERSION=14 \
          node scripts/verify-backup-files.mjs

      - name: Upload migration evidence
        uses: actions/upload-artifact@v4
        with:
          name: database-migration-evidence-${{ github.run_id }}
          path: |
            migration-preflight.json
            migration-result.json
            post-migration-backup-verification.json
            post-migration-backup-result.jsonl
          if-no-files-found: error
          retention-days: 14

      - name: Upload encrypted post-migration backup
        uses: actions/upload-artifact@v4
        with:
          name: encrypted-post-migration-backup-${{ github.run_id }}
          path: |
            post-migration-backup/*.enc
            post-migration-backup/*.manifest.json
            post-migration-backup-result.jsonl
            post-migration-backup-verification.json
          if-no-files-found: error
          retention-days: 14

      - name: Upload safe migration failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: database-migration-failure-${{ github.run_id }}
          path: |
            migration-connection-diagnostic.json
            pre-migration-backup-verification.json
            migration-preflight.json
            migration-result.json
          if-no-files-found: warn
          retention-days: 14

      - name: Publish migration status
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          HEAD_SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          JOB_STATUS: ${{ job.status }}
        run: |
          node <<'NODE'
          const success=process.env.JOB_STATUS==='success';
          const response=await fetch(`https://api.github.com/repos/${process.env.REPOSITORY}/statuses/${process.env.HEAD_SHA}`,{
            method:'POST',
            headers:{Accept:'application/vnd.github+json',Authorization:`Bearer ${process.env.GITHUB_TOKEN}`,'X-GitHub-Api-Version':'2022-11-28','Content-Type':'application/json'},
            body:JSON.stringify({state:success?'success':'failure',context:'database-migrations',target_url:process.env.RUN_URL,description:success?'Schema 14 applied and verified with encrypted backups.':'Migration failed; production transaction was rolled back or stopped by a guard.'})
          });
          if(!response.ok)throw new Error(`Status publication failed with HTTP ${response.status}`);
          NODE
