name: Apply Final Acceptance Migrations

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/apply-pending-migrations.yml'
      - 'scripts/resolve-supabase-connection.mjs'
      - 'scripts/governance-migration-preflight.mjs'
      - 'scripts/governance-migration-verify.mjs'
      - 'scripts/final-acceptance-database.mjs'
      - 'scripts/reversal-ledger-acceptance.mjs'
      - 'scripts/apply-isolated-accounting-migrations.mjs'
      - 'scripts/ensure-isolated-supabase-roles.mjs'
      - 'scripts/accounting-production-integrity.mjs'
      - 'scripts/restore-drill.mjs'
      - 'scripts/verify-backup-files.mjs'
      - 'scripts/backup-supabase.mjs'
      - 'scripts/record-backup-evidence.mjs'
      - 'supabase/migrations/019_accounting_import_and_telegram_integrity.sql'
      - 'supabase/migrations/020_accounting_reversal_and_projection_safety.sql'
      - 'supabase/migrations/021_reversal_ledger_balance_fix.sql'
      - 'supabase/migrations/022_schema_21_runtime_repair.sql'
      - 'supabase/migrations/023_factory_reset_operational_data.sql'
      - 'supabase/migrations/024_employee_nickname_and_financial_command_center.sql'

permissions:
  contents: read
  statuses: write

concurrency:
  group: binhamid-production-database-migrations
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: migration_clone
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d migration_clone"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
    env:
      LOCAL_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/migration_clone
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Validate repository and final acceptance contracts
        run: |
          set -euo pipefail
          npm install --ignore-scripts --no-audit --no-fund
          node --check scripts/resolve-supabase-connection.mjs
          node --check scripts/governance-migration-preflight.mjs
          node --check scripts/governance-migration-verify.mjs
          node --check scripts/final-acceptance-database.mjs
          node --check scripts/reversal-ledger-acceptance.mjs
          node --check scripts/apply-isolated-accounting-migrations.mjs
          node --check scripts/ensure-isolated-supabase-roles.mjs
          node --check scripts/accounting-production-integrity.mjs
          node --check scripts/restore-drill.mjs
          node --check api/_lib/routes/daily-report.js
          node --check api/_lib/routes/accounting.js
          node --check api/_lib/telegram-webhook-gateway.js
          npm run audit:migrations
          npm test
          npm run check:api
          npm run check:functions

      - name: Install PostgreSQL 17 client
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y curl ca-certificates
          sudo install -d -m 0755 /usr/share/postgresql-common/pgdg
          sudo curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc
          . /etc/os-release
          printf '%s\n' 'Types: deb' 'URIs: https://apt.postgresql.org/pub/repos/apt' "Suites: ${VERSION_CODENAME}-pgdg" 'Components: main' 'Signed-By: /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc' | sudo tee /etc/apt/sources.list.d/pgdg.sources > /dev/null
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client-17
          test -x /usr/lib/postgresql/17/bin/pg_dump
          echo '/usr/lib/postgresql/17/bin' >> "$GITHUB_PATH"

      - name: Resolve protected database connection
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_POOLER_HOST: ${{ vars.SUPABASE_POOLER_HOST }}
          CONNECTION_DIAGNOSTIC_PATH: migration-connection-diagnostic.json
        run: node scripts/resolve-supabase-connection.mjs

      - name: Create and verify encrypted pre-migration backup
        env:
          BACKUP_ENCRYPTION_KEY: ${{ secrets.BACKUP_ENCRYPTION_KEY }}
          BACKUP_ENVIRONMENT: production-pre-final-acceptance
          BACKUP_OUTPUT_DIR: pre-migration-backup
        shell: bash
        run: |
          set -euo pipefail
          rm -rf pre-migration-backup
          mkdir -p pre-migration-backup
          : > pre-migration-backup-result.jsonl
          node scripts/backup-supabase.mjs | tee pre-migration-backup-result.jsonl
          test "${PIPESTATUS[0]}" -eq 0
          BACKUP_RESULT_FILE=pre-migration-backup-result.jsonl \
          BACKUP_OUTPUT_DIR=pre-migration-backup \
          BACKUP_VERIFICATION_FILE=pre-migration-backup-verification.json \
          BACKUP_MANIFEST_ENV_NAME=PRE_MIGRATION_MANIFEST \
          node scripts/verify-backup-files.mjs

      - name: Run production migration preflight
        env:
          MIGRATION_PREFLIGHT_PATH: migration-preflight.json
        run: node scripts/governance-migration-preflight.mjs

      - name: Restore production backup to isolated PostgreSQL 17
        env:
          BACKUP_ENCRYPTION_KEY: ${{ secrets.BACKUP_ENCRYPTION_KEY }}
          RESTORE_ARTIFACT_DIR: pre-migration-backup
          RESTORE_DRILL_RESULT: isolated-restore-before.json
          SUPABASE_DB_URL: ''
        run: node scripts/restore-drill.mjs

      - name: Prepare isolated PostgreSQL extensions
        shell: bash
        run: |
          set -euo pipefail
          psql "$LOCAL_DATABASE_URL" -X -v ON_ERROR_STOP=1 -c 'create extension if not exists pgcrypto;'

      - name: Apply schema 19-24 to isolated clone atomically
        env:
          ISOLATED_MIGRATION_TARGET: '24'
          ISOLATED_MIGRATION_APPLY_RESULT: isolated-migration-apply.json
        run: node scripts/apply-isolated-accounting-migrations.mjs

      - name: Run transactional accounting and duplicate acceptance
        env:
          TEST_DATABASE_URL: ${{ env.LOCAL_DATABASE_URL }}
          FINAL_ACCEPTANCE_DB_RESULT: isolated-final-acceptance.json
        run: node scripts/final-acceptance-database.mjs

      - name: Verify isolated schema 24, Telegram runtime and reversal ledger
        env:
          SUPABASE_DB_URL: ${{ env.LOCAL_DATABASE_URL }}
          MIGRATION_PREFLIGHT_PATH: migration-preflight.json
          MIGRATION_RESULT_PATH: isolated-migration-result.json
          TEST_DATABASE_URL: ${{ env.LOCAL_DATABASE_URL }}
          REVERSAL_ACCEPTANCE_RESULT: reversal-ledger-result.json
        run: |
          set -euo pipefail
          node scripts/governance-migration-verify.mjs
          node scripts/reversal-ledger-acceptance.mjs

      - name: Apply pending migrations to production atomically
        shell: bash
        run: |
          set -euo pipefail
          current_version="$(node -e "const x=require('./migration-preflight.json');process.stdout.write(String(x.currentVersion))")"
          if [ "$current_version" -lt 24 ]; then
            : > pending-migrations.sql
            for version in $(seq $((current_version + 1)) 24); do
              file="$(find supabase/migrations -maxdepth 1 -type f -name "$(printf '%03d' "$version")_*.sql" -print -quit)"
              test -n "$file"
              cat "$file" >> pending-migrations.sql
              printf '\n' >> pending-migrations.sql
            done
            psql "$SUPABASE_DB_URL" -X -v ON_ERROR_STOP=1 --single-transaction --file pending-migrations.sql
            rm -f pending-migrations.sql
          else
            echo 'Database is already at schema version 24.'
          fi

      - name: Verify production schema and accounting integrity
        env:
          MIGRATION_PREFLIGHT_PATH: migration-preflight.json
          MIGRATION_RESULT_PATH: migration-result.json
          ACCOUNTING_INTEGRITY_PATH: production-accounting-integrity.json
        run: |
          set -euo pipefail
          node scripts/governance-migration-verify.mjs
          node scripts/accounting-production-integrity.mjs

      - name: Create and verify encrypted post-migration backup
        env:
          BACKUP_ENCRYPTION_KEY: ${{ secrets.BACKUP_ENCRYPTION_KEY }}
          BACKUP_ENVIRONMENT: production-post-final-acceptance
          BACKUP_OUTPUT_DIR: post-migration-backup
        shell: bash
        run: |
          set -euo pipefail
          rm -rf post-migration-backup
          mkdir -p post-migration-backup
          : > post-migration-backup-result.jsonl
          node scripts/backup-supabase.mjs | tee post-migration-backup-result.jsonl
          test "${PIPESTATUS[0]}" -eq 0
          BACKUP_RESULT_FILE=post-migration-backup-result.jsonl \
          BACKUP_OUTPUT_DIR=post-migration-backup \
          BACKUP_VERIFICATION_FILE=post-migration-backup-verification.json \
          BACKUP_MANIFEST_ENV_NAME=POST_MIGRATION_MANIFEST \
          EXPECTED_SCHEMA_VERSION=24 \
          node scripts/verify-backup-files.mjs

      - name: Restore post-migration backup to second isolated database
        env:
          BACKUP_ENCRYPTION_KEY: ${{ secrets.BACKUP_ENCRYPTION_KEY }}
          RESTORE_ARTIFACT_DIR: post-migration-backup
          RESTORE_DRILL_RESULT: isolated-restore-after.json
          LOCAL_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/post_migration_restore
          SUPABASE_DB_URL: ''
        shell: bash
        run: |
          set -euo pipefail
          psql 'postgresql://postgres:postgres@127.0.0.1:5432/postgres' -X -v ON_ERROR_STOP=1 -c 'create database post_migration_restore;'
          node scripts/restore-drill.mjs

      - name: Record verified post-migration backup metadata
        env:
          BACKUP_OUTPUT_DIR: post-migration-backup
          BACKUP_RESULT_FILE: post-migration-backup-result.jsonl
        run: node scripts/record-backup-evidence.mjs

      - name: Upload migration evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: final-acceptance-migration-evidence-${{ github.run_id }}
          path: |
            migration-connection-diagnostic.json
            migration-preflight.json
            isolated-restore-before.json
            isolated-role-result.json
            isolated-migration-apply.json
            isolated-migration-result.json
            isolated-final-acceptance.json
            reversal-ledger-result.json
            migration-result.json
            production-accounting-integrity.json
            pre-migration-backup-verification.json
            post-migration-backup-verification.json
            isolated-restore-after.json
            pre-migration-backup/*.enc
            pre-migration-backup/*.manifest.json
            post-migration-backup/*.enc
            post-migration-backup/*.manifest.json
          if-no-files-found: warn
          retention-days: 14

      - name: Publish migration status
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          HEAD_SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          JOB_STATUS: ${{ job.status }}
        run: |
          node <<'NODE'
          const success=process.env.JOB_STATUS==='success';
          const response=await fetch(`https://api.github.com/repos/${process.env.REPOSITORY}/statuses/${process.env.HEAD_SHA}`,{
            method:'POST',
            headers:{Accept:'application/vnd.github+json',Authorization:`Bearer ${process.env.GITHUB_TOKEN}`,'X-GitHub-Api-Version':'2022-11-28','Content-Type':'application/json'},
            body:JSON.stringify({state:success?'success':'failure',context:'final-acceptance-migrations',target_url:process.env.RUN_URL,description:success?'Schema 24 restored, tested, applied atomically and backed up.':'Migration stopped or rolled back before final acceptance.'})
          });
          if(!response.ok)throw new Error(`Status publication failed with HTTP ${response.status}`);
          NODE
