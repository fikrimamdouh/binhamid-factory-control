name: Diagnose Verified Predeploy Patch
on:
  pull_request:
    branches:
      - main
permissions:
  contents: read
jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/existing-declaration-editor-language-split
      - name: Record part sizes and checksums
        run: |
          {
            wc -c .patch/part*.b64
            sha256sum .patch/part*.b64
            cat .patch/part*.b64 | base64 --decode > /tmp/binhamid-predeploy-fixes.tgz || true
            wc -c /tmp/binhamid-predeploy-fixes.tgz
            sha256sum /tmp/binhamid-predeploy-fixes.tgz
            tar -tzf /tmp/binhamid-predeploy-fixes.tgz || true
          } > patch-diagnostic.txt 2>&1
          cat patch-diagnostic.txt
      - uses: actions/upload-artifact@v4
        with:
          name: patch-diagnostic
          path: patch-diagnostic.txt
          retention-days: 1
