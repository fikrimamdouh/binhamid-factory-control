name: Apply Verified Predeploy Fixes
on:
  push:
    branches:
      - fix/existing-declaration-editor-language-split
permissions:
  contents: write
jobs:
  apply:
    if: ${{ github.actor != 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/existing-declaration-editor-language-split
          fetch-depth: 0
      - name: Decode and verify patch
        run: |
          cat .patch/part*.b64 | base64 --decode > /tmp/binhamid-predeploy-fixes.tgz
          echo '1b62839c55fd050c1b3a60f1f6017cdc5312ab09d6ff79110e76e923a773d02d  /tmp/binhamid-predeploy-fixes.tgz' | sha256sum --check -
          tar -xzf /tmp/binhamid-predeploy-fixes.tgz
      - name: Remove temporary inspection material
        run: |
          rm -rf .patch
          rm -f tests/_inspect-declaration-structure.test.mjs
          rm -f .github/workflows/inspect-driver-language.yml
      - name: Validate edited JavaScript
        run: |
          node --check assets/sync-integrity-guard.js
          node --check assets/cloud-control.js
          node --check assets/login-sync.js
          node --check assets/telegram-pdf-declarations.js
          node --check assets/master-data-unified-operations.js
          node --check assets/employee-declaration-sync.js
          node --check assets/declaration-workspace-fixes.js
          node --check api/_lib/routes/canonical-master-data.js
          node --check api/_lib/routes/reports-telegram.js
      - name: Commit branch-only fixes
        run: |
          git config user.name 'binhamid-predeploy-bot'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git diff --cached --stat
          git commit -m 'fix: stabilize declarations cloud sync and Telegram delivery'
          git push origin HEAD:fix/existing-declaration-editor-language-split
