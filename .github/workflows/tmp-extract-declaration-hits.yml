name: Focused Declaration Extractor
on:
  push:
    branches: [fix/restore-original-declaration-texts]
    paths: ['.github/workflows/tmp-extract-declaration-hits.yml']
permissions:
  contents: write
jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/restore-original-declaration-texts
      - name: Extract focused declaration lines
        run: python scripts/extract-declaration-hits.py
      - name: Commit result
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add debug/declaration-hits.txt
          git diff --cached --quiet && exit 0
          git commit -m 'chore: extract focused declaration text hits'
          git push origin HEAD:fix/restore-original-declaration-texts
