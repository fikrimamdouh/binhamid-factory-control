name: Production Readiness Check

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - Apply Final Acceptance Migrations
    types:
      - completed

permissions:
  contents: read
  statuses: write

jobs:
  readiness:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Run repository tests
        run: |
          set -euo pipefail
          npm install --ignore-scripts --no-audit --no-fund
          node --check api/_lib/routes/daily-report.js
          node --check api/_lib/routes/accounting.js
          node --check api/_lib/telegram-webhook-gateway.js
          node --check scripts/production-db-readiness.mjs
          node --check scripts/production-data-integrity.mjs
          node --check scripts/accounting-production-integrity.mjs
          npm test
          npm run check:api
          npm run check:functions

      - name: Wait for live schema-24 deployment
        run: |
          set -euo pipefail
          node <<'NODE'
          import { writeFileSync } from 'node:fs';
          const url='https://binhamid-factory-control.vercel.app/api/system/status';
          let report={checkedAt:new Date().toISOString(),url,ok:false,directOperationsSchema:0};
          for(let attempt=1;attempt<=18;attempt++){
            try{
              const response=await fetch(`${url}?attempt=${attempt}&t=${Date.now()}`,{headers:{Accept:'application/json'},signal:AbortSignal.timeout(20000)});
              const body=await response.json().catch(()=>null);
              report={checkedAt:new Date().toISOString(),url,status:response.status,ok:response.ok&&body?.ok===true,directOperationsSchema:Number(body?.directOperationsSchema||0),version:body?.version||null,webhookVersion:Number(body?.webhookVersion||0),vercelFunctionsExpected:Number(body?.vercelFunctionsExpected||0),attempt};
              if(report.ok&&report.directOperationsSchema===24&&report.webhookVersion===3)break;
            }catch(error){report={checkedAt:new Date().toISOString(),url,ok:false,errorCode:error?.name||'FETCH_FAILED',attempt};}
            await new Promise(resolve=>setTimeout(resolve,30000));
          }
          writeFileSync('production-http-status.json',`${JSON.stringify(report,null,2)}\n`,{mode:0o600});
          console.log(`[live-status] ok=${report.ok}; schema=${report.directOperationsSchema||0}; version=${report.version||'unknown'}; attempt=${report.attempt||0}`);
          NODE

      - name: Install PostgreSQL 17 client
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y curl ca-certificates
          sudo install -d -m 0755 /usr/share/postgresql-common/pgdg
          sudo curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc
          . /etc/os-release
          printf '%s\n' 'Types: deb' 'URIs: https://apt.postgresql.org/pub/repos/apt' "Suites: ${VERSION_CODENAME}-pgdg" 'Components: main' 'Signed-By: /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc' | sudo tee /etc/apt/sources.list.d/pgdg.sources > /dev/null
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client-17
          echo '/usr/lib/postgresql/17/bin' >> "$GITHUB_PATH"

      - name: Resolve protected database connection
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_POOLER_HOST: ${{ vars.SUPABASE_POOLER_HOST }}
          CONNECTION_DIAGNOSTIC_PATH: readiness-connection-diagnostic.json
        run: node scripts/resolve-supabase-connection.mjs

      - name: Check production schema requirements
        env:
          PRODUCTION_READINESS_PATH: production-readiness.json
        run: node scripts/production-db-readiness.mjs

      - name: Check production data integrity
        run: node scripts/production-data-integrity.mjs

      - name: Check production accounting integrity
        env:
          ACCOUNTING_INTEGRITY_PATH: production-accounting-integrity.json
        run: node scripts/accounting-production-integrity.mjs

      - name: Report customer master schema
        run: node scripts/customer-schema-report.mjs

      - name: Audit customer source metadata
        run: node scripts/production-customer-sources.mjs

      - name: Analyze stored workbook when publicly readable
        env:
          SUPABASE_STORAGE_BUCKET: ${{ vars.SUPABASE_STORAGE_BUCKET || 'factory-documents' }}
        run: node scripts/analyze-public-stored-import.mjs

      - name: Upload readiness evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-readiness-${{ github.run_id }}
          path: |
            production-http-status.json
            production-readiness.json
            production-data-integrity.json
            production-accounting-integrity.json
            customer-schema-report.json
            production-customer-sources.json
            stored-import-analysis.json
            readiness-connection-diagnostic.json
          if-no-files-found: warn
          retention-days: 14

      - name: Enforce live application version
        run: |
          set -euo pipefail
          node <<'NODE'
          import { readFileSync } from 'node:fs';
          const report=JSON.parse(readFileSync('production-http-status.json','utf8'));
          if(!report.ok||Number(report.directOperationsSchema)!==24||Number(report.webhookVersion)!==3){
            console.error(`[live-status] deployment mismatch: expected schema 24/webhook 3, received ${report.directOperationsSchema||0}/${report.webhookVersion||0}`);
            process.exit(1);
          }
          NODE

      - name: Publish readiness status
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          JOB_STATUS: ${{ job.status }}
        run: |
          node <<'NODE'
          const success=process.env.JOB_STATUS==='success';
          const response=await fetch(`https://api.github.com/repos/${process.env.REPOSITORY}/statuses/${process.env.HEAD_SHA}`,{
            method:'POST',
            headers:{Accept:'application/vnd.github+json',Authorization:`Bearer ${process.env.GITHUB_TOKEN}`,'X-GitHub-Api-Version':'2022-11-28','Content-Type':'application/json'},
            body:JSON.stringify({state:success?'success':'failure',context:'production-readiness',target_url:process.env.RUN_URL,description:success?'Live schema 24, Telegram, accounting and data integrity checks passed.':'Production acceptance evidence failed or deployment is not schema 24.'})
          });
          if(!response.ok)throw new Error(`Status publication failed with HTTP ${response.status}`);
          NODE
