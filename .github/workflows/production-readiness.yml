name: Production Readiness Check

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/production-readiness.yml'
      - 'api/_lib/routes/system-runtime.js'
      - 'api/_lib/routes/daily-report.js'
      - 'api/_lib/daily-report-customers.js'
      - 'supabase/migrations/015_daily_report_customer_master.sql'
      - 'scripts/production-db-readiness.mjs'
      - 'scripts/production-data-integrity.mjs'
      - 'scripts/customer-schema-report.mjs'
      - 'scripts/resolve-supabase-connection.mjs'

permissions:
  contents: read
  statuses: write

jobs:
  readiness:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Run repository tests
        run: |
          set -euo pipefail
          npm install --ignore-scripts --no-audit --no-fund
          node --check api/_lib/daily-report-customers.js
          node --check api/_lib/routes/daily-report.js
          node --check scripts/production-db-readiness.mjs
          node --check scripts/production-data-integrity.mjs
          node --check scripts/customer-schema-report.mjs
          npm test
          npm run check:api
          npm run check:functions

      - name: Check live application status
        run: |
          set -euo pipefail
          node <<'NODE'
          import { writeFileSync } from 'node:fs';
          const url='https://binhamid-factory-control.vercel.app/api/system/status';
          let report;
          try{
            const response=await fetch(url,{headers:{Accept:'application/json'},signal:AbortSignal.timeout(20000)});
            const body=await response.json().catch(()=>null);
            report={checkedAt:new Date().toISOString(),url,status:response.status,ok:response.ok&&body?.ok===true,directOperationsSchema:Number(body?.directOperationsSchema||0),version:body?.version||null,webhookVersion:Number(body?.webhookVersion||0),vercelFunctionsExpected:Number(body?.vercelFunctionsExpected||0)};
          }catch(error){report={checkedAt:new Date().toISOString(),url,ok:false,errorCode:error?.name||'FETCH_FAILED'};}
          writeFileSync('production-http-status.json',`${JSON.stringify(report,null,2)}\n`,{mode:0o600});
          console.log(`[live-status] ok=${report.ok}; schema=${report.directOperationsSchema||0}; version=${report.version||'unknown'}`);
          if(!report.ok||report.directOperationsSchema!==15)process.exit(1);
          NODE

      - name: Install PostgreSQL 17 client
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y curl ca-certificates
          sudo install -d -m 0755 /usr/share/postgresql-common/pgdg
          sudo curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc
          . /etc/os-release
          printf '%s\n' \
            'Types: deb' \
            'URIs: https://apt.postgresql.org/pub/repos/apt' \
            "Suites: ${VERSION_CODENAME}-pgdg" \
            'Components: main' \
            'Signed-By: /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc' \
            | sudo tee /etc/apt/sources.list.d/pgdg.sources > /dev/null
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client-17
          echo '/usr/lib/postgresql/17/bin' >> "$GITHUB_PATH"

      - name: Resolve protected database connection
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_POOLER_HOST: ${{ vars.SUPABASE_POOLER_HOST }}
          CONNECTION_DIAGNOSTIC_PATH: readiness-connection-diagnostic.json
        run: node scripts/resolve-supabase-connection.mjs

      - name: Check production schema requirements
        env:
          PRODUCTION_READINESS_PATH: production-readiness.json
        run: node scripts/production-db-readiness.mjs

      - name: Check production data integrity
        run: node scripts/production-data-integrity.mjs

      - name: Report customer master schema
        run: node scripts/customer-schema-report.mjs

      - name: Upload readiness evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-readiness-${{ github.run_id }}
          path: |
            production-http-status.json
            production-readiness.json
            production-data-integrity.json
            customer-schema-report.json
            readiness-connection-diagnostic.json
          if-no-files-found: warn
          retention-days: 14

      - name: Publish readiness status
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          HEAD_SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          JOB_STATUS: ${{ job.status }}
        run: |
          node <<'NODE'
          const success=process.env.JOB_STATUS==='success';
          const response=await fetch(`https://api.github.com/repos/${process.env.REPOSITORY}/statuses/${process.env.HEAD_SHA}`,{
            method:'POST',
            headers:{Accept:'application/vnd.github+json',Authorization:`Bearer ${process.env.GITHUB_TOKEN}`,'X-GitHub-Api-Version':'2022-11-28','Content-Type':'application/json'},
            body:JSON.stringify({state:success?'success':'failure',context:'production-readiness',target_url:process.env.RUN_URL,description:success?'Live runtime, schema 15, and data checks passed.':'Live runtime or schema-15 readiness checks failed.'})
          });
          if(!response.ok)throw new Error(`Status publication failed with HTTP ${response.status}`);
          NODE
