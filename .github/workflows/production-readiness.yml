name: Production Readiness Check

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/production-readiness.yml'
      - 'api/_lib/routes/system-runtime.js'
      - 'api/_lib/supabase.js'
      - 'api/_lib/config.js'

permissions:
  contents: read
  statuses: write

jobs:
  readiness:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Run repository tests
        run: |
          set -euo pipefail
          npm install --ignore-scripts --no-audit --no-fund
          npm test
          npm run check:api
          npm run check:functions

      - name: Check production through application data layer
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          node <<'NODE'
          import { writeFileSync } from 'node:fs';
          import { collectDatabaseReadiness } from './api/_lib/routes/system-runtime.js';
          import { validateEnvironment } from './api/_lib/config.js';
          const database=await collectDatabaseReadiness();
          const environment=validateEnvironment('database');
          const report={
            format:'binhamid-production-readiness-v1',
            checkedAt:new Date().toISOString(),
            ok:database.ready&&environment.ready&&Number(database.schemaVersion)===14,
            database:{
              ready:database.ready,
              schemaVersion:database.schemaVersion,
              latestRequiredVersion:database.latestRequiredVersion,
              missingTables:database.missingTables,
              missingViews:database.missingViews,
              missingColumns:database.missingColumns,
              missingMigrations:database.missingMigrations,
              appliedMigrationCount:database.appliedMigrations.length
            },
            environment:{ready:environment.ready,missingRequired:environment.missingRequired},
            readOnly:true
          };
          writeFileSync('production-readiness.json',`${JSON.stringify(report,null,2)}\n`,{mode:0o600});
          console.log(`[production-readiness] ready=${report.ok}; schema=${database.schemaVersion}`);
          if(!report.ok)process.exit(1);
          NODE

      - name: Upload readiness evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-readiness-${{ github.run_id }}
          path: production-readiness.json
          if-no-files-found: warn
          retention-days: 14

      - name: Publish readiness status
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          HEAD_SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          JOB_STATUS: ${{ job.status }}
        run: |
          node <<'NODE'
          const success=process.env.JOB_STATUS==='success';
          const response=await fetch(`https://api.github.com/repos/${process.env.REPOSITORY}/statuses/${process.env.HEAD_SHA}`,{
            method:'POST',
            headers:{Accept:'application/vnd.github+json',Authorization:`Bearer ${process.env.GITHUB_TOKEN}`,'X-GitHub-Api-Version':'2022-11-28','Content-Type':'application/json'},
            body:JSON.stringify({state:success?'success':'failure',context:'production-readiness',target_url:process.env.RUN_URL,description:success?'Production schema and application data layer are ready.':'Production readiness checks failed.'})
          });
          if(!response.ok)throw new Error(`Status publication failed with HTTP ${response.status}`);
          NODE
