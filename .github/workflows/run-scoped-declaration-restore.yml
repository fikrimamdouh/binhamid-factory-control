name: Scoped Declaration Restore Validation
on:
  push:
    branches:
      - fix/restore-declarations-sales-v3
    paths:
      - '.github/workflows/run-scoped-declaration-restore.yml'
      - 'scripts/run-scoped-declaration-restore.txt'
  pull_request:
    branches:
      - main
permissions:
  contents: write
jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/restore-declarations-sales-v3
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
      - name: Apply scoped restoration
        run: python scripts/apply-declaration-sales-restore.py
      - name: Verify server PDF syntax
        run: node --check api/_lib/customer-portfolio-pdf.js
      - name: Verify restored declarations and sales settings
        run: node scripts/verify-declaration-sales.mjs
      - name: Capture validation failure
        if: failure()
        run: |
          mkdir -p debug
          node scripts/verify-declaration-sales.mjs > debug/declaration-validation-error.txt 2>&1 || true
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add debug/declaration-validation-error.txt
          git diff --cached --quiet && exit 0
          git commit -m 'chore: capture declaration validation failure'
          git push origin HEAD:fix/restore-declarations-sales-v3
      - name: Verify no unrelated files changed
        run: |
          git status --porcelain
          unexpected="$(git status --porcelain | sed -E 's/^.. //' | grep -Ev '^(api/_lib/customer-portfolio-pdf\.js|legacy\.html|scripts/verify-declaration-sales\.mjs)$' || true)"
          test -z "$unexpected" || { echo "Unexpected changed files:"; echo "$unexpected"; exit 1; }
      - name: Run project tests
        run: |
          npm install --ignore-scripts --no-audit --no-fund
          npm test
      - name: Remove temporary automation
        if: success()
        run: |
          rm -f scripts/apply-declaration-sales-restore.py scripts/run-scoped-declaration-restore.txt scripts/verify-declaration-sales.mjs
          rm -f .github/workflows/run-scoped-declaration-restore.yml notes/.keep-review debug/declaration-validation-error.txt
          rmdir notes debug 2>/dev/null || true
      - name: Commit validated change
        if: success()
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --quiet && exit 1
          git commit -m 'fix: restore original declarations and configure sales employees'
          git push origin HEAD:fix/restore-declarations-sales-v3
