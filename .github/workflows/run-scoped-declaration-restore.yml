name: Scoped Declaration Restore Validation
on:
  push:
    branches:
      - fix/restore-declarations-sales-v3
    paths:
      - '.github/workflows/run-scoped-declaration-restore.yml'
      - 'scripts/run-scoped-declaration-restore.txt'
  pull_request:
    branches:
      - main
permissions:
  contents: write
jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/restore-declarations-sales-v3
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
      - name: Apply scoped restoration
        run: python scripts/apply-declaration-sales-restore.py
      - name: Verify server PDF syntax
        run: node --check api/_lib/customer-portfolio-pdf.js
      - name: Verify restored declarations and sales settings
        shell: bash
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          const legacy=fs.readFileSync('legacy.html','utf8');
          const server=fs.readFileSync('api/_lib/customer-portfolio-pdf.js','utf8');
          const defBlock=legacy.match(/const DEF = \{[\s\S]*?\n\};/)?.[0]||'';
          const cliBlock=defBlock.match(/\bcli:`([\s\S]*?)`,\s*\n\s*cliX:/)?.[1]||'';
          const added1='ألتزم بمتابعة المبالغ غير المسددة خلال مهلة {الأيام} أيام من تاريخ التوريد، ورفع حالة المتأخرات للإدارة.';
          const added2='ألتزم بأن مهلة السداد المحددة أعلاه ({الأيام} أيام) نافذة فقط في حال توفر السيولة الكافية لدى المنشأة لشراء المواد الخام التشغيلية؛ وفي حال عدم توفر هذه السيولة، ألتزم أنا (المحصل أو مسؤول مبيعات الخرسانة) بتحصيل دفعة مقدمة من العميل قبل التوريد، أو بتحصيل كامل قيمة الحساب فورًا، ولا يجوز الاعتداد بمهلة السداد المذكورة في هذه الحالة إلا بموافقة كتابية مسبقة من الإدارة.';
          const count=(text,needle)=>text.split(needle).length-1;
          const required=[
            'أُقر بأنني استلمت المركبة/المعدة الموصوفة أعلاه بحالة فنية سليمة',
            'أُقر بأن العملاء المدرجين في هذا النموذج مُسندون إليّ',
            'يقر المندوب بمسؤوليته الكاملة عن العملاء المُسندين إليه',
            'أُقر باستلامي العهدة النقدية الموضحة أعلاه',
            'أُقر بأنني المسؤول المباشر والفني عن تشغيل محطة الخلط',
            'يُقر مشرف المحطة بمسؤوليته الفنية الكاملة عن جودة الخلطات',
            'أُقر باستلامي عهدة الورشة من عُدد وأجهزة قياس ومعدات',
            'وبناءً عليه، أُقر أنا الموقّع أدناه بأنني قرأت هذا النموذج',
            "const SALES_EMPLOYEE_DEFAULTS_VERSION='2026-07-21-sales-responsibles-v1';",
            "name:'خالد عبد الله',nid:'2414111530',salary:5000,commissionPerUnit:1",
            "name:'خالد محمد',nid:'2370328136',salary:3500,commissionPerUnit:0",
            'id="opsConcreteSalary"','id="opsConcreteCommission"','id="opsBlockSalary"'
          ];
          for(const value of required)if(!legacy.includes(value))throw new Error('Missing required value: '+value);
          if(count(cliBlock,added1)!==1||count(cliBlock,added2)!==1)throw new Error('Added portfolio clause is not exactly once in DEF.cli');
          if(cliBlock.includes('ألتزم بإثبات كل توريد باسم العميل الصحيح'))throw new Error('Replacement customer wording remains in DEF.cli');
          if(!server.includes('const CUSTOMER_PORTFOLIO_DECLARATION =')||!server.includes(added1)||!server.includes(added2))throw new Error('Server PDF canonical declaration is incomplete');
          if(server.includes("declarationText:legacy?.txt?.cli||''"))throw new Error('Server PDF still reads mutable declaration text');
          console.log('DECLARATION_AND_SALES_SETTINGS_OK');
          NODE
      - name: Verify no unrelated files changed
        run: |
          git status --porcelain
          unexpected="$(git status --porcelain | sed -E 's/^.. //' | grep -Ev '^(api/_lib/customer-portfolio-pdf\.js|legacy\.html|scripts/verify-declaration-sales\.mjs|debug/declaration-validation-error\.txt)$' || true)"
          test -z "$unexpected" || { echo "Unexpected changed files:"; echo "$unexpected"; exit 1; }
      - name: Run project tests
        run: |
          npm install --ignore-scripts --no-audit --no-fund
          npm test
      - name: Remove temporary automation
        if: success()
        run: |
          rm -f scripts/apply-declaration-sales-restore.py scripts/run-scoped-declaration-restore.txt scripts/verify-declaration-sales.mjs
          rm -f .github/workflows/run-scoped-declaration-restore.yml notes/.keep-review debug/declaration-validation-error.txt
          rmdir notes debug 2>/dev/null || true
      - name: Commit validated change
        if: success()
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --quiet && exit 1
          git commit -m 'fix: restore original declarations and configure sales employees'
          git push origin HEAD:fix/restore-declarations-sales-v3
