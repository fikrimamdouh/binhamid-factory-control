name: Scoped Declaration Restore Validation
on:
  push:
    branches:
      - fix/restore-declarations-sales-v3
    paths:
      - '.github/workflows/run-scoped-declaration-restore.yml'
      - 'scripts/run-scoped-declaration-restore.txt'
  pull_request:
    branches:
      - main
permissions:
  contents: write
jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/restore-declarations-sales-v3
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
      - name: Apply scoped restoration
        run: python scripts/apply-declaration-sales-restore.py
      - name: Verify changed files are scoped
        run: |
          node --check api/_lib/customer-portfolio-pdf.js
          node scripts/verify-declaration-sales.mjs
          changed="$(git status --porcelain | sed -E 's/^.. //' | sort)"
          echo "$changed"
          test "$changed" = $'api/_lib/customer-portfolio-pdf.js\nlegacy.html\nscripts/verify-declaration-sales.mjs' || { echo 'Unexpected changed files'; exit 1; }
      - name: Run project tests
        run: |
          npm install --ignore-scripts --no-audit --no-fund
          npm test
      - name: Remove temporary automation
        if: success()
        run: |
          rm -f scripts/apply-declaration-sales-restore.py scripts/run-scoped-declaration-restore.txt scripts/verify-declaration-sales.mjs
          rm -f .github/workflows/run-scoped-declaration-restore.yml notes/.keep-review
          rmdir notes 2>/dev/null || true
      - name: Commit validated change
        if: success()
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --quiet && exit 1
          git commit -m 'fix: restore original declarations and configure sales employees'
          git push origin HEAD:fix/restore-declarations-sales-v3
