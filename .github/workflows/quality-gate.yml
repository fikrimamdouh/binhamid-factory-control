name: Repository Quality Gate

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
      - name: Install dependencies
        run: npm install --ignore-scripts --no-audit --no-fund
      - name: Audit migrations
        run: npm run audit:migrations
      - name: Check enterprise source
        run: node scripts/check-enterprise.mjs
      - name: Check operational source
        run: node scripts/check-operational-roadmap.mjs
      - name: Audit legacy size
        run: npm run audit:legacy
      - name: Run tests
        run: npm test
      - name: Check API contracts
        run: npm run check:api
      - name: Check Vercel functions
        run: npm run check:functions
