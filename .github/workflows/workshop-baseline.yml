name: Workshop Baseline Audit

on:
  workflow_dispatch:
  push:
    branches:
      - agent/workshop-baseline-20260720
    paths:
      - '.github/workflows/workshop-baseline.yml'
      - 'scripts/workshop-baseline.mjs'
      - 'scripts/resolve-supabase-connection.mjs'

permissions:
  contents: read
  statuses: write

jobs:
  baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: binhamid-workshop-baseline
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Install PostgreSQL 17 client
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y curl ca-certificates
          sudo install -d -m 0755 /usr/share/postgresql-common/pgdg
          sudo curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc
          . /etc/os-release
          printf '%s\n' \
            'Types: deb' \
            'URIs: https://apt.postgresql.org/pub/repos/apt' \
            "Suites: ${VERSION_CODENAME}-pgdg" \
            'Components: main' \
            'Signed-By: /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc' \
            | sudo tee /etc/apt/sources.list.d/pgdg.sources > /dev/null
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client-17
          echo '/usr/lib/postgresql/17/bin' >> "$GITHUB_PATH"

      - name: Resolve protected production connection
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_POOLER_HOST: ${{ vars.SUPABASE_POOLER_HOST }}
          CONNECTION_DIAGNOSTIC_PATH: workshop-baseline-connection.json
        run: node scripts/resolve-supabase-connection.mjs

      - name: Run read-only workshop baseline
        env:
          WORKSHOP_BASELINE_OUTPUT: workshop-baseline.json
        run: node scripts/workshop-baseline.mjs

      - name: Upload baseline evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workshop-baseline-${{ github.run_id }}
          path: |
            workshop-baseline.json
            workshop-baseline-connection.json
          if-no-files-found: error
          retention-days: 30

      - name: Publish baseline status
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          HEAD_SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          JOB_RESULT: ${{ job.status }}
        shell: bash
        run: |
          node <<'NODE'
          const success=process.env.JOB_RESULT==='success';
          const response=await fetch(`https://api.github.com/repos/${process.env.REPOSITORY}/statuses/${process.env.HEAD_SHA}`,{
            method:'POST',
            headers:{
              Accept:'application/vnd.github+json',
              Authorization:`Bearer ${process.env.GITHUB_TOKEN}`,
              'X-GitHub-Api-Version':'2022-11-28',
              'Content-Type':'application/json'
            },
            body:JSON.stringify({
              state:success?'success':'failure',
              context:'workshop-baseline:read-only',
              target_url:process.env.RUN_URL,
              description:success?'Read-only workshop baseline completed.':'Workshop baseline failed; no production data was changed.'
            })
          });
          if(!response.ok)throw new Error(`Status publication failed with HTTP ${response.status}`);
          NODE
