name: Runtime Registration Excel Diagnostic

on:
  push:
    branches:
      - agent/runtime-registration-excel-diagnostic
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PRODUCTION_URL: https://binhamid-factory-control.vercel.app
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Install PostgreSQL client
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Collect sanitized runtime evidence
        run: node scripts/runtime-registration-excel-diagnostic.mjs

      - name: Upload diagnostic evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-registration-excel-diagnostic-${{ github.run_id }}
          path: runtime-registration-excel-diagnostic.json
          if-no-files-found: error
          retention-days: 7

      - name: Publish diagnostic status
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          node <<'NODE'
          import { readFileSync } from 'node:fs';
          const report=JSON.parse(readFileSync('runtime-registration-excel-diagnostic.json','utf8'));
          const critical=Number(report.summary?.critical||0),state=critical?'failure':'success';
          const description=critical?`${critical} runtime blocker(s); inspect sanitized artifact.`:'Registration, Excel and web persistence checks passed.';
          const response=await fetch(`https://api.github.com/repos/${process.env.GITHUB_REPOSITORY}/statuses/${process.env.GITHUB_SHA}`,{method:'POST',headers:{Accept:'application/vnd.github+json',Authorization:`Bearer ${process.env.GITHUB_TOKEN}`,'X-GitHub-Api-Version':'2022-11-28','Content-Type':'application/json'},body:JSON.stringify({state,context:'runtime-registration-excel-diagnostic',description,target_url:`${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`})});
          if(!response.ok)throw new Error(`Status publication failed: ${response.status}`);
          NODE
