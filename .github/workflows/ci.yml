name: Project Checks

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: npm install --ignore-scripts --no-audit --no-fund
      - name: Capture Vercel function inventory
        run: npm run audit:functions > function-inventory.txt
      - uses: actions/upload-artifact@v4
        with:
          name: vercel-function-inventory
          path: function-inventory.txt
      - run: npm run check
