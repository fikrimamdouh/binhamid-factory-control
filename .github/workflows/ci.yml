name: Project Checks

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
      - run: npm install --ignore-scripts --no-audit --no-fund
      - name: Capture Vercel function inventory
        run: npm run audit:functions > function-inventory.txt
      - uses: actions/upload-artifact@v4
        with:
          name: vercel-function-inventory
          path: function-inventory.txt
      - name: Run project checks
        id: project-checks
        continue-on-error: true
        run: npm run check > check-output.txt 2>&1
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: project-check-output
          path: check-output.txt
      - name: Enforce project checks
        if: steps.project-checks.outcome != 'success'
        run: cat check-output.txt && exit 1
      - name: Prepare local Vercel project settings
        run: |
          mkdir -p .vercel "$RUNNER_TEMP/vercel-global"
          cat > .vercel/project.json <<'JSON'
          {
            "projectId": "prj_local_binhamid",
            "orgId": "team_local_binhamid",
            "projectName": "binhamid-factory-control",
            "settings": {
              "createdAt": 0,
              "framework": null,
              "devCommand": null,
              "installCommand": null,
              "buildCommand": null,
              "outputDirectory": null,
              "rootDirectory": null,
              "directoryListing": false,
              "nodeVersion": "24.x"
            }
          }
          JSON
      - name: Run local Vercel build
        id: vercel-build
        continue-on-error: true
        run: |
          env | cut -d= -f1 | grep -E '^(VERCEL|NOW)' | sort > vercel-env-names.txt || true
          env -u VERCEL_TOKEN -u NOW_TOKEN -u VERCEL_OIDC_TOKEN -u VERCEL_ARTIFACTS_TOKEN VERCEL_TELEMETRY_DISABLED=1 npx --yes vercel@56.2.0 build --yes --global-config "$RUNNER_TEMP/vercel-global" > vercel-build-output.txt 2>&1
      - name: Count Vercel output functions
        if: always()
        run: |
          if [ -d .vercel/output/functions ]; then
            find .vercel/output/functions -type d -name '*.func' | sort > vercel-output-functions.txt
            echo "VERCEL_OUTPUT_FUNCTION_COUNT=$(wc -l < vercel-output-functions.txt | tr -d ' ')" >> vercel-output-functions.txt
          else
            echo "VERCEL_OUTPUT_FUNCTION_COUNT=0" > vercel-output-functions.txt
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: vercel-local-build
          path: |
            vercel-build-output.txt
            vercel-output-functions.txt
            vercel-env-names.txt
      - name: Enforce local Vercel build
        if: steps.vercel-build.outcome != 'success'
        run: cat vercel-build-output.txt && exit 1
