name: Telegram Bot Schedules

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Send Telegram operational alerts
        env:
          ENDPOINT: ${{ secrets.BOT_CRON_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        shell: bash
        run: |
          test -n "$ENDPOINT" || { echo "BOT_CRON_URL secret is missing"; exit 1; }
          test -n "$CRON_SECRET" || { echo "CRON_SECRET secret is missing"; exit 1; }
          curl --fail-with-body --silent --show-error \
            --retry 3 --retry-all-errors \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$ENDPOINT?mode=alerts"
