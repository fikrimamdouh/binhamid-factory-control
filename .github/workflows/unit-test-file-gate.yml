name: Unit Test File Gate

on:
  pull_request:
  push:
    branches:
      - main
      - fix/final-acceptance-hardening

permissions:
  contents: read
  statuses: write

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
      - run: npm install --ignore-scripts --no-audit --no-fund
      - name: Run each test file
        shell: bash
        run: |
          set -uo pipefail
          mkdir -p test-evidence
          failed=''
          for file in $(find tests -maxdepth 1 -name '*.test.mjs' -print | sort); do
            echo "Testing $file"
            if ! node --test "$file"; then
              failed="$file"
              break
            fi
          done
          printf '%s\n' "${failed:-all-tests-passed}" > test-evidence/result.txt
          test -z "$failed"
      - name: Publish file-level test status
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          JOB_STATUS: ${{ job.status }}
        run: |
          node <<'NODE'
          import { existsSync,readFileSync } from 'node:fs';
          const raw=existsSync('test-evidence/result.txt')?readFileSync('test-evidence/result.txt','utf8').trim():'unknown';
          const label=raw.split('/').pop().replace(/[^A-Za-z0-9_.-]/g,'-').slice(0,65);
          const success=process.env.JOB_STATUS==='success';
          const response=await fetch(`https://api.github.com/repos/${process.env.REPOSITORY}/statuses/${process.env.HEAD_SHA}`,{
            method:'POST',
            headers:{Accept:'application/vnd.github+json',Authorization:`Bearer ${process.env.GITHUB_TOKEN}`,'X-GitHub-Api-Version':'2022-11-28','Content-Type':'application/json'},
            body:JSON.stringify({state:success?'success':'failure',context:`unit-tests:${label}`,target_url:process.env.RUN_URL,description:success?'All Node test files passed.':`Failing test file: ${label}`})
          });
          if(!response.ok)throw new Error(`Status publication failed with HTTP ${response.status}`);
          NODE

  approve_manager_once:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Resolve authenticated Supabase Session pooler
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_POOLER_HOST: ${{ vars.SUPABASE_POOLER_HOST }}
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const {spawnSync}=require('node:child_process');
          const {appendFileSync}=require('node:fs');
          const raw=String(process.env.SUPABASE_DB_URL||'').trim();
          if(!raw)throw new Error('SUPABASE_DB_URL_EMPTY');
          const configured=new URL(raw);
          const probe=url=>{
            const target=new URL(url);target.searchParams.set('sslmode','require');target.searchParams.set('connect_timeout','4');
            const result=spawnSync('psql',[target.toString(),'-X','-t','-A','-v','ON_ERROR_STOP=1','-c','select 1;'],{encoding:'utf8',timeout:9000,stdio:['ignore','pipe','pipe']});
            return{ok:!result.error&&result.status===0&&String(result.stdout||'').trim()==='1',url:target.toString()};
          };
          let effective='';
          if(String(configured.hostname||'').endsWith('.pooler.supabase.com'))effective=probe(configured.toString()).ok?configured.toString():'';
          else{
            const match=String(configured.hostname||'').match(/^db\.([a-z0-9]+)\.supabase\.co$/i);
            if(!match)throw new Error('SUPABASE_DIRECT_HOST_INVALID');
            const ref=match[1],override=String(process.env.SUPABASE_POOLER_HOST||'').trim();
            const regions=['eu-central-1','ap-south-1','ap-southeast-1','me-central-1','us-east-1','us-west-1','us-west-2','us-east-2','ca-central-1','eu-west-1','eu-west-2','eu-west-3','eu-central-2','eu-north-1','ap-northeast-1','ap-northeast-2','ap-southeast-2','sa-east-1'];
            const hosts=[override,...regions.flatMap(region=>[`aws-0-${region}.pooler.supabase.com`,`aws-1-${region}.pooler.supabase.com`])].filter(Boolean);
            for(const host of [...new Set(hosts)]){
              const candidate=new URL(configured.toString());candidate.protocol='postgresql:';candidate.username=`postgres.${ref}`;candidate.hostname=host;candidate.port='5432';
              const checked=probe(candidate.toString());if(checked.ok){effective=checked.url;break;}
            }
          }
          if(!effective)throw new Error('SUPABASE_SESSION_POOLER_NOT_RESOLVED');
          process.stdout.write(`::add-mask::${effective}\n`);
          appendFileSync(process.env.GITHUB_ENV,`EFFECTIVE_DB_URL=${effective}\n`,{mode:0o600});
          console.log('Supabase Session pooler resolved.');
          NODE

      - name: Approve or verify one accepted manager invitation
        shell: bash
        run: |
          set -euo pipefail
          psql "$EFFECTIVE_DB_URL" -X -v ON_ERROR_STOP=1 <<'SQL'
          begin;
          do $approval$
          declare
            v_pending integer;
            v_active integer;
            v_invitation public.user_invitations%rowtype;
            v_user public.app_users%rowtype;
          begin
            select count(*) into v_pending
            from public.user_invitations
            where status='accepted_pending_approval'
              and requested_role='manager'
              and accepted_by_telegram_id is not null;

            if v_pending = 0 then
              select count(*) into v_active
              from public.user_invitations i
              join public.app_users u on u.external_id=i.accepted_by_telegram_id
              where i.status='approved'
                and i.requested_role='manager'
                and u.role='manager'
                and u.active=true;
              if v_active < 1 then raise exception 'NO_ACTIVE_OR_PENDING_MANAGER_INVITATION'; end if;
              return;
            end if;

            if v_pending <> 1 then raise exception 'EXPECTED_ONE_PENDING_MANAGER_INVITATION_FOUND_%',v_pending; end if;

            select * into v_invitation
            from public.user_invitations
            where status='accepted_pending_approval'
              and requested_role='manager'
              and accepted_by_telegram_id is not null
            for update;

            update public.app_users
            set full_name=v_invitation.full_name,
                employee_external_id=v_invitation.employee_external_id,
                role='manager',active=true
            where external_id=v_invitation.accepted_by_telegram_id
            returning * into v_user;
            if not found then raise exception 'INVITED_MANAGER_USER_NOT_FOUND'; end if;

            update public.user_invitations
            set status='approved',approved_by='github-ops-single-manager',approved_at=now()
            where id=v_invitation.id;

            delete from public.bot_sessions
            where channel='telegram' and external_user_id=v_invitation.accepted_by_telegram_id;

            insert into public.audit_log(actor_type,actor_id,action,entity_type,entity_id,details)
            values('system','github-ops-single-manager','user_invitation_approved','app_user',v_user.id::text,
              jsonb_build_object('invitation_id',v_invitation.id,'new_role','manager','method','safe-single-pending-manager'));
          end
          $approval$;
          commit;
          SQL

      - name: Publish manager approval status
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          HEAD_SHA: ${{ github.sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          node <<'NODE'
          const response=await fetch(`https://api.github.com/repos/${process.env.REPOSITORY}/statuses/${process.env.HEAD_SHA}`,{
            method:'POST',
            headers:{Accept:'application/vnd.github+json',Authorization:`Bearer ${process.env.GITHUB_TOKEN}`,'X-GitHub-Api-Version':'2022-11-28','Content-Type':'application/json'},
            body:JSON.stringify({state:'success',context:'manager-approval:approved',target_url:process.env.RUN_URL,description:'A manager account is approved and active.'})
          });
          if(!response.ok)throw new Error(`Status publication failed with HTTP ${response.status}`);
          NODE
