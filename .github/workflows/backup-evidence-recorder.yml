name: Backup Evidence Recorder

on:
  workflow_run:
    workflows:
      - Encrypted Database Backup
      - Apply Database Migrations
    types:
      - completed

permissions:
  contents: read
  actions: read

jobs:
  record:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: binhamid-backup-evidence-registry
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - name: Install PostgreSQL client
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Select verified artifact
        id: artifact
        env:
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          SOURCE_RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          set -euo pipefail
          if [ "$WORKFLOW_NAME" = 'Apply Database Migrations' ]; then
            name="encrypted-post-migration-backup-${SOURCE_RUN_ID}"
          else
            name="encrypted-database-backup-${SOURCE_RUN_ID}"
          fi
          printf 'name=%s\n' "$name" >> "$GITHUB_OUTPUT"

      - name: Download verified backup evidence
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_RUN_ID: ${{ github.event.workflow_run.id }}
          ARTIFACT_NAME: ${{ steps.artifact.outputs.name }}
        run: |
          set -euo pipefail
          rm -rf backup-evidence
          mkdir -p backup-evidence
          gh run download "$SOURCE_RUN_ID" --repo "$GITHUB_REPOSITORY" --name "$ARTIFACT_NAME" --dir backup-evidence
          test "$(find backup-evidence -type f -name '*.enc' | wc -l)" -eq 1
          test "$(find backup-evidence -type f -name '*.manifest.json' | wc -l)" -eq 1

      - name: Resolve protected database connection
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_POOLER_HOST: ${{ vars.SUPABASE_POOLER_HOST }}
          CONNECTION_DIAGNOSTIC_PATH: backup-evidence-connection.json
        run: node scripts/resolve-supabase-connection.mjs

      - name: Register verified backup metadata
        env:
          BACKUP_OUTPUT_DIR: backup-evidence
          BACKUP_RESULT_FILE: backup-evidence/backup-result.jsonl
        run: |
          set -euo pipefail
          result_file="$(find backup-evidence -type f -name '*backup-result*.jsonl' -o -name 'backup-result.jsonl' | head -n1)"
          test -n "$result_file"
          BACKUP_RESULT_FILE="$result_file" node scripts/record-backup-evidence.mjs

      - name: Upload safe registration evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backup-registry-evidence-${{ github.run_id }}
          path: backup-evidence-connection.json
          if-no-files-found: error
          retention-days: 7
