<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><script src="https://telegram.org/js/telegram-web-app.js"></script><title>عمليات مصنع بن حامد</title><style>body{margin:0;background:#f3f5f6;color:#143442;font-family:Tahoma,Arial,sans-serif}.app{max-width:720px;margin:auto;padding:18px}.brand{background:#0d506a;color:#fff;padding:18px;border-radius:16px}.brand h1{font-size:20px;margin:0 0 6px}.tabs{display:flex;gap:7px;overflow:auto;margin:14px 0}.tabs button,.btn{border:0;border-radius:10px;padding:11px 13px;background:#fff;color:#0d506a;font-weight:700}.tabs button.on,.btn{background:#bd8b28;color:#fff}.card{background:#fff;border-radius:14px;padding:14px;margin:10px 0;box-shadow:0 1px 5px #0022}.row{padding:10px 0;border-bottom:1px solid #e7eaec}.row:last-child{border:0}label{display:block;font-size:12px;margin-top:9px;color:#59707b}input,select{width:100%;box-sizing:border-box;padding:10px;border:1px solid #cbd5da;border-radius:9px;margin-top:3px;background:#fff}.muted{color:#647982;font-size:13px}.bad{color:#a82020}.ok{color:#167344}.hide{display:none}</style></head><body><main class="app"><section class="brand"><h1>مصنع بن حامد — عمليات Telegram</h1><div id="who">جارٍ التحقق من هويتك…</div></section><nav class="tabs" id="tabs"></nav><section id="view" class="card"></section></main><script>
(()=>{const tg=window.Telegram?.WebApp,view=document.querySelector('#view'),tabs=document.querySelector('#tabs'),who=document.querySelector('#who');let profile={},tab='customers';const esc=x=>String(x??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));async function api(action,data={}){const r=await fetch('/api/telegram/mini-app',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({initData:tg?.initData||'',action,...data})}),j=await r.json().catch(()=>({}));if(!r.ok)throw Error(j.error||'تعذر تنفيذ الطلب');return j}function setTabs(){tabs.innerHTML=[['customers','العملاء'],['imports','ملفات بها أخطاء'],['assignments','إسناد السائقين']].filter(x=>x[0]!=='assignments'||profile.canAssign).map(x=>`<button class="${tab===x[0]?'on':''}" data-tab="${x[0]}">${x[1]}</button>`).join('');tabs.onclick=e=>{if(e.target.dataset.tab){tab=e.target.dataset.tab;render()}}}async function customers(){const d=await api('customers');view.innerHTML='<h3>العملاء والأرصدة الافتتاحية</h3><p class="muted">التعديل هنا يُسجل باسم حساب Telegram المعتمد. رصيد أول المدة يرفع من قالب العملاء المعتمد.</p>'+d.customers.map(c=>`<details class="row"><summary><b>${esc(c.customer_name)}</b> — ${esc(c.customer_code||c.external_id)}</summary><label>الاسم</label><input data-f="name" value="${esc(c.customer_name)}"><label>كود العميل</label><input data-f="code" value="${esc(c.customer_code||'')}"><label>الهاتف</label><input data-f="phone" value="${esc(c.phone||'')}"><label>حد الائتمان</label><input data-f="limit" type="number" value="${Number(c.credit_limit||0)}"><label>أيام السداد</label><input data-f="days" type="number" value="${Number(c.payment_days||0)}"><button class="btn" data-save="${c.id}">حفظ</button></details>`).join('');view.querySelectorAll('[data-save]').forEach(b=>b.onclick=async()=>{const box=b.parentElement;try{await api('save_customer',{id:b.dataset.save,customerName:box.querySelector('[data-f=name]').value,customerCode:box.querySelector('[data-f=code]').value,phone:box.querySelector('[data-f=phone]').value,creditLimit:box.querySelector('[data-f=limit]').value,paymentDays:box.querySelector('[data-f=days]').value});b.textContent='تم الحفظ';tg?.HapticFeedback?.notificationOccurred('success')}catch(e){alert(e.message)}})}async function imports(){const d=await api('failed_imports');view.innerHTML='<h3>مراجعة ملفات Excel المتوقفة</h3><p class="muted">لا يمكن تمرير ملف خاطئ من هنا؛ صحّح الملف ثم ارفعه من Telegram. لم تُنشأ قيود جزئية.</p>'+(d.imports.length?d.imports.map(x=>`<div class="row"><b>${esc(x.original_name)}</b><br><span class="bad">${esc(x.status)} — أخطاء: ${Number(x.error_count||0)}</span><pre class="muted">${esc(JSON.stringify(x.summary||{},null,2).slice(0,900))}</pre></div>`).join(''):'<p class="ok">لا توجد ملفات متوقفة.</p>')}async function assignments(){const d=await api('assignment_data'),by=new Map(d.assignments.map(x=>[x.app_user_id,x]));view.innerHTML='<h3>إسناد السائقين والمركبات</h3>'+d.users.map(u=>{const a=by.get(u.id)||{};return`<div class="row"><b>${esc(u.full_name)}</b><label>المركبة</label><select data-u="${u.id}"><option value="">بدون مركبة</option>${d.vehicles.map(v=>`<option value="${esc(v.external_id)}" ${a.vehicle_external_id===v.external_id?'selected':''}>${esc(v.plate_no||v.asset_no||v.external_id)} — ${esc(v.make||'')}</option>`).join('')}</select><button class="btn" data-a="${u.id}">حفظ الإسناد</button></div>`}).join('');view.querySelectorAll('[data-a]').forEach(b=>b.onclick=async()=>{try{await api('save_assignment',{appUserId:b.dataset.a,vehicleExternalId:view.querySelector(`[data-u="${b.dataset.a}"]`).value});b.textContent='تم الحفظ'}catch(e){alert(e.message)}})}async function render(){setTabs();view.innerHTML='جارٍ التحميل…';try{if(tab==='customers')await customers();else if(tab==='imports')await imports();else await assignments()}catch(e){view.innerHTML=`<p class="bad">${esc(e.message)}</p>`}}async function init(){try{tg?.ready();tg?.expand();profile=await api('profile');who.textContent=`${profile.user.name} — ${profile.user.role}`;if(!profile.canManage){view.innerHTML='<p class="bad">هذه الواجهة مخصصة للمدير والمحاسب.</p>';return}render()}catch(e){who.textContent='لا يمكن فتح الصفحة إلا من زر داخل البوت.';view.innerHTML=`<p class="bad">${esc(e.message)}</p>`}}init()})();
</script></body></html>
