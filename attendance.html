<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Bin Hamid Attendance</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root{color-scheme:light dark;--bg:#f4f1e9;--card:#fff;--ink:#143746;--muted:#667a82;--gold:#a87824;--green:#17704b;--red:#a13333;--line:#d9dfdf}
    *{box-sizing:border-box}html,body{min-height:100%;margin:0;font-family:system-ui,-apple-system,"Segoe UI",Arial,sans-serif;background:var(--bg);color:var(--ink)}
    body{display:grid;place-items:center;padding:18px}.card{width:min(520px,100%);background:var(--card);border:1px solid var(--line);border-radius:22px;padding:24px;box-shadow:0 18px 50px rgba(18,52,68,.12)}
    .brand{display:flex;align-items:center;gap:12px;margin-bottom:18px}.mark{width:54px;height:54px;border-radius:16px;background:#102f40;color:#efd79a;display:grid;place-items:center;font-weight:900}.brand b{display:block;font-size:18px}.brand small{color:var(--muted)}
    .langs{display:flex;gap:7px;flex-wrap:wrap;margin:10px 0 20px}.langs button{border:1px solid var(--line);background:transparent;color:inherit;border-radius:999px;padding:7px 10px;font-size:12px}.langs button.on{background:#102f40;color:#fff;border-color:#102f40}
    h1{font-size:25px;margin:0 0 10px}.intro{color:var(--muted);line-height:1.8;margin:0 0 22px}.status{border:1px solid var(--line);border-radius:16px;padding:18px;text-align:center;min-height:150px;display:grid;place-items:center}.spinner{width:42px;height:42px;border-radius:50%;border:4px solid #dce5e7;border-top-color:var(--gold);animation:spin .8s linear infinite;margin:auto}@keyframes spin{to{transform:rotate(360deg)}}
    .status strong{font-size:18px;display:block;margin:10px 0 4px}.status p{margin:0;color:var(--muted);line-height:1.7}.ok{color:var(--green)}.bad{color:var(--red)}.details{margin-top:14px;background:#f5f7f6;border-radius:13px;padding:12px;font-size:14px;line-height:1.8;text-align:start}
    .actions{display:grid;gap:10px;margin-top:16px}.btn{width:100%;border:0;border-radius:13px;padding:14px 16px;font-weight:800;font-size:16px;background:#102f40;color:#fff}.btn.alt{background:#e9eeed;color:#143746}.privacy{font-size:12px;color:var(--muted);line-height:1.7;margin:16px 0 0;text-align:center}
    @media(prefers-color-scheme:dark){:root{--bg:#0e1b22;--card:#15262e;--ink:#eef5f6;--muted:#a7b5ba;--line:#31434a}.details{background:#1c3039}.btn.alt{background:#2a3b42;color:#eef5f6}}
  </style>
</head>
<body>
  <main class="card">
    <div class="brand"><div class="mark">BH</div><div><b>Bin Hamid Factory</b><small id="brandSub">Attendance & Location</small></div></div>
    <div class="langs" id="langs"></div>
    <h1 id="title"></h1>
    <p class="intro" id="intro"></p>
    <section class="status" id="status"></section>
    <div class="actions" id="actions"></div>
    <p class="privacy" id="privacy"></p>
  </main>
<script>
(function(){
  const tg=window.Telegram?.WebApp;
  const eventType=new URLSearchParams(location.search).get('event')==='check_out'?'check_out':'check_in';
  const T={
    ar:{dir:'rtl',brand:'الحضور والموقع',inTitle:'تسجيل الحضور',outTitle:'تسجيل الانصراف',intro:'تقرأ هذه الشاشة موقع GPS الحالي تلقائيًا. لا توجد خريطة ولا اختيار موقع يدوي.',privacy:'يُحفظ الوقت والموقع والدقة والمسافة من موقع العمل لأغراض الحضور والرقابة فقط.',locating:'جارٍ قراءة موقعك الحالي',accuracy:'دقة القراءة',wait:'انتظر عدة ثوانٍ حتى نحصل على أفضل دقة.',retry:'إعادة المحاولة',close:'إغلاق',notTelegram:'افتح هذه الشاشة من زر الحضور داخل بوت Telegram.',noGps:'هذا الجهاز أو المتصفح لا يدعم GPS.',denied:'تم رفض إذن الموقع. فعّل الموقع للتطبيق ثم أعد المحاولة.',timeout:'تعذر الحصول على قراءة دقيقة في الوقت المحدد.',sending:'جارٍ التحقق والتسجيل',successIn:'تم تسجيل الحضور بنجاح',successOut:'تم تسجيل الانصراف بنجاح',outside:'أنت خارج نطاق موقع العمل. تم حفظ المحاولة ولم تُعتمد كحضور صحيح.',duplicate:'هذه الحركة مسجلة بالفعل خلال الدقائق الأخيرة.',site:'موقع العمل',distance:'المسافة',reference:'المرجع',meters:'متر',error:'تعذر التسجيل'},
    en:{dir:'ltr',brand:'Attendance & Location',inTitle:'Check In',outTitle:'Check Out',intro:'This screen reads your current GPS location automatically. There is no map and no manual location selection.',privacy:'Time, GPS accuracy and distance from the assigned work site are stored only for attendance and operational control.',locating:'Reading your current location',accuracy:'GPS accuracy',wait:'Wait a few seconds while we obtain the best reading.',retry:'Try again',close:'Close',notTelegram:'Open this screen from the attendance button inside the Telegram bot.',noGps:'GPS is not available on this device or browser.',denied:'Location permission was denied. Enable location access for Telegram and try again.',timeout:'A sufficiently accurate location could not be obtained in time.',sending:'Verifying and recording',successIn:'Check-in recorded successfully',successOut:'Check-out recorded successfully',outside:'You are outside the assigned work-site radius. The attempt was saved but was not accepted as valid attendance.',duplicate:'This attendance event was already recorded in the last few minutes.',site:'Work site',distance:'Distance',reference:'Reference',meters:'m',error:'Recording failed'},
    hi:{dir:'ltr',brand:'उपस्थिति और स्थान',inTitle:'उपस्थिति दर्ज करें',outTitle:'प्रस्थान दर्ज करें',intro:'यह स्क्रीन आपके वर्तमान GPS स्थान को अपने आप पढ़ती है। कोई नक्शा या मैनुअल स्थान चयन उपलब्ध नहीं है।',privacy:'समय, GPS की सटीकता और कार्यस्थल से दूरी केवल उपस्थिति और संचालन नियंत्रण के लिए सुरक्षित की जाती है।',locating:'वर्तमान स्थान पढ़ा जा रहा है',accuracy:'GPS सटीकता',wait:'सर्वोत्तम सटीकता के लिए कुछ सेकंड प्रतीक्षा करें।',retry:'फिर से प्रयास करें',close:'बंद करें',notTelegram:'इस स्क्रीन को Telegram बॉट के उपस्थिति बटन से खोलें।',noGps:'इस डिवाइस या ब्राउज़र में GPS उपलब्ध नहीं है।',denied:'स्थान की अनुमति अस्वीकार हुई। Telegram के लिए स्थान अनुमति चालू करके फिर प्रयास करें।',timeout:'समय पर पर्याप्त सटीक स्थान नहीं मिल सका।',sending:'जाँच और पंजीकरण हो रहा है',successIn:'उपस्थिति सफलतापूर्वक दर्ज हुई',successOut:'प्रस्थान सफलतापूर्वक दर्ज हुआ',outside:'आप निर्धारित कार्यस्थल की सीमा से बाहर हैं। प्रयास सुरक्षित हुआ लेकिन वैध उपस्थिति के रूप में स्वीकार नहीं हुआ।',duplicate:'यह रिकॉर्ड पिछले कुछ मिनटों में पहले ही दर्ज हो चुका है।',site:'कार्यस्थल',distance:'दूरी',reference:'संदर्भ',meters:'मीटर',error:'रिकॉर्ड दर्ज नहीं हुआ'},
    bn:{dir:'ltr',brand:'উপস্থিতি ও অবস্থান',inTitle:'উপস্থিতি নিবন্ধন',outTitle:'প্রস্থান নিবন্ধন',intro:'এই স্ক্রিন স্বয়ংক্রিয়ভাবে আপনার বর্তমান GPS অবস্থান পড়ে। কোনো মানচিত্র বা হাতে স্থান নির্বাচন নেই।',privacy:'সময়, GPS নির্ভুলতা এবং কর্মস্থল থেকে দূরত্ব শুধু উপস্থিতি ও পরিচালনা নিয়ন্ত্রণের জন্য সংরক্ষিত হয়।',locating:'বর্তমান অবস্থান পড়া হচ্ছে',accuracy:'GPS নির্ভুলতা',wait:'সেরা নির্ভুলতা পাওয়ার জন্য কয়েক সেকেন্ড অপেক্ষা করুন।',retry:'আবার চেষ্টা করুন',close:'বন্ধ করুন',notTelegram:'Telegram বটের উপস্থিতি বোতাম থেকে এই স্ক্রিন খুলুন।',noGps:'এই ডিভাইস বা ব্রাউজারে GPS নেই।',denied:'অবস্থান অনুমতি দেওয়া হয়নি। Telegram-এর জন্য অবস্থান অনুমতি চালু করে আবার চেষ্টা করুন।',timeout:'সময়ের মধ্যে যথেষ্ট নির্ভুল অবস্থান পাওয়া যায়নি।',sending:'যাচাই ও নিবন্ধন হচ্ছে',successIn:'উপস্থিতি সফলভাবে নিবন্ধিত হয়েছে',successOut:'প্রস্থান সফলভাবে নিবন্ধিত হয়েছে',outside:'আপনি নির্ধারিত কর্মস্থলের সীমার বাইরে আছেন। চেষ্টা সংরক্ষিত হয়েছে কিন্তু বৈধ উপস্থিতি হিসেবে গ্রহণ করা হয়নি।',duplicate:'গত কয়েক মিনিটে এই রেকর্ড ইতিমধ্যে নিবন্ধিত হয়েছে।',site:'কর্মস্থল',distance:'দূরত্ব',reference:'রেফারেন্স',meters:'মিটার',error:'নিবন্ধন ব্যর্থ হয়েছে'},
    ur:{dir:'rtl',brand:'حاضری اور مقام',inTitle:'حاضری درج کریں',outTitle:'روانگی درج کریں',intro:'یہ اسکرین آپ کا موجودہ GPS مقام خودکار طور پر پڑھتی ہے۔ نقشہ یا مقام منتخب کرنے کی سہولت موجود نہیں۔',privacy:'وقت، GPS کی درستگی اور کام کی جگہ سے فاصلہ صرف حاضری اور آپریشنل نگرانی کے لیے محفوظ کیا جاتا ہے۔',locating:'موجودہ مقام پڑھا جا رہا ہے',accuracy:'GPS درستگی',wait:'بہترین درستگی کے لیے چند سیکنڈ انتظار کریں۔',retry:'دوبارہ کوشش کریں',close:'بند کریں',notTelegram:'یہ اسکرین Telegram بوٹ کے حاضری بٹن سے کھولیں۔',noGps:'اس ڈیوائس یا براؤزر میں GPS دستیاب نہیں۔',denied:'مقام کی اجازت مسترد ہوگئی۔ Telegram کے لیے مقام کی اجازت فعال کرکے دوبارہ کوشش کریں۔',timeout:'مقررہ وقت میں مناسب درست مقام حاصل نہیں ہوا۔',sending:'تصدیق اور اندراج جاری ہے',successIn:'حاضری کامیابی سے درج ہوگئی',successOut:'روانگی کامیابی سے درج ہوگئی',outside:'آپ مقررہ کام کی جگہ کی حدود سے باہر ہیں۔ کوشش محفوظ ہوئی لیکن درست حاضری کے طور پر قبول نہیں ہوئی۔',duplicate:'یہ ریکارڈ گزشتہ چند منٹ میں پہلے ہی درج ہوچکا ہے۔',site:'کام کی جگہ',distance:'فاصلہ',reference:'حوالہ',meters:'میٹر',error:'اندراج ناکام ہوگیا'}
  };
  let lang=localStorage.getItem('bh_att_lang')||String(tg?.initDataUnsafe?.user?.language_code||navigator.language||'en').slice(0,2).toLowerCase();
  if(!T[lang])lang='en';
  const $=id=>document.getElementById(id),status=$('status'),actions=$('actions');
  function tr(){return T[lang]||T.en;}
  function apply(){const x=tr();document.documentElement.lang=lang;document.documentElement.dir=x.dir;$('brandSub').textContent=x.brand;$('title').textContent=eventType==='check_in'?x.inTitle:x.outTitle;$('intro').textContent=x.intro;$('privacy').textContent=x.privacy;document.querySelectorAll('[data-lang]').forEach(b=>b.classList.toggle('on',b.dataset.lang===lang));}
  function languageButtons(){const names={ar:'العربية',en:'English',hi:'हिन्दी',bn:'বাংলা',ur:'اردو'};$('langs').innerHTML=Object.entries(names).map(([code,name])=>`<button type="button" data-lang="${code}">${name}</button>`).join('');$('langs').onclick=e=>{const code=e.target?.dataset?.lang;if(!code)return;lang=code;localStorage.setItem('bh_att_lang',lang);apply();start();};}
  function button(label,fn,alt=false){const b=document.createElement('button');b.type='button';b.className='btn'+(alt?' alt':'');b.textContent=label;b.onclick=fn;actions.appendChild(b);}
  function loading(accuracy){const x=tr();status.innerHTML=`<div><div class="spinner"></div><strong>${x.locating}</strong><p>${accuracy?`${x.accuracy}: ${Math.round(accuracy)} ${x.meters}`:x.wait}</p></div>`;actions.innerHTML='';}
  function failure(message){const x=tr();status.innerHTML=`<div><strong class="bad">${x.error}</strong><p>${message}</p></div>`;actions.innerHTML='';button(x.retry,start);button(x.close,()=>tg?.close(),true);tg?.HapticFeedback?.notificationOccurred('error');}
  function success(data){const x=tr(),accepted=Boolean(data.accepted),title=data.duplicate?x.duplicate:accepted?(eventType==='check_in'?x.successIn:x.successOut):x.outside;status.innerHTML=`<div><strong class="${accepted?'ok':'bad'}">${title}</strong><div class="details">${x.site}: <b>${data.site?.name||'-'}</b><br>${x.distance}: <b>${Math.round(data.distanceM||0)} ${x.meters}</b><br>${x.reference}: <b>${data.reference||'-'}</b></div></div>`;actions.innerHTML='';button(x.close,()=>tg?.close());if(!accepted)button(x.retry,start,true);tg?.HapticFeedback?.notificationOccurred(accepted?'success':'warning');}
  async function submit(position){const x=tr();status.innerHTML=`<div><div class="spinner"></div><strong>${x.sending}</strong></div>`;actions.innerHTML='';try{const response=await fetch('/api/admin/attendance',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'webapp_attendance',initData:tg?.initData||'',eventType,latitude:position.coords.latitude,longitude:position.coords.longitude,accuracy:position.coords.accuracy,capturedAt:new Date(position.timestamp||Date.now()).toISOString()})});const data=await response.json().catch(()=>({}));if(!response.ok)throw new Error(data.error||data.message||x.error);success(data);}catch(error){failure(error.message||x.error);}}
  function start(){const x=tr();apply();if(!tg?.initData)return failure(x.notTelegram);if(!navigator.geolocation)return failure(x.noGps);loading();let best=null,watchId=null,finished=false;const done=()=>{if(finished)return;finished=true;if(watchId!==null)navigator.geolocation.clearWatch(watchId);if(best&&best.coords.accuracy<=150)submit(best);else failure(x.timeout);};const timer=setTimeout(done,15000);watchId=navigator.geolocation.watchPosition(position=>{if(!best||position.coords.accuracy<best.coords.accuracy)best=position;loading(best.coords.accuracy);if(best.coords.accuracy<=30){clearTimeout(timer);setTimeout(done,700);}},error=>{clearTimeout(timer);if(watchId!==null)navigator.geolocation.clearWatch(watchId);failure(error.code===1?x.denied:error.code===3?x.timeout:x.noGps);},{enableHighAccuracy:true,maximumAge:0,timeout:14000});}
  tg?.ready();tg?.expand();languageButtons();apply();setTimeout(start,500);
})();
</script>
</body>
</html>
